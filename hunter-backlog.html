<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter — Backlog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; max-width: 800px; margin: 0 auto; line-height: 1.6; }
  h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
  .back { font-size: 13px; color: #58a6ff; text-decoration: none; margin-bottom: 20px; display: inline-block; }
  .task { padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
  .task.done { color: #484f58; text-decoration: line-through; }
  .section { font-size: 13px; color: #58a6ff; font-weight: 600; margin-top: 16px; margin-bottom: 4px; }
  .stats { font-size: 13px; color: #8b949e; margin-bottom: 16px; }
  #content { margin-top: 16px; }
  .note { font-size: 12px; color: #484f58; margin-top: 20px; }
</style>
</head>
<body>
<a href="./" class="back">← Dashboard</a>
<h1>Hunter — Backlog</h1>
<div class="stats" id="stats"></div>
<div id="content">Loading...</div>
<div class="note" id="note"></div>
<script>
function render(md) {
  const lines = md.split('\n');
  let html = '', section = '', open = 0, closed = 0, skip = false;
  lines.forEach(l => {
    if (l.match(/^#{1,3}\s/)) {
      const t = l.replace(/^#+\s*/, '');
      skip = !!t.match(/^Сделано|^Метаданные/);
      if (!skip) html += '<div class="section">' + t + '</div>';
      section = t;
    }
    if (skip) { if (l.match(/^---/)) skip = false; return; }
    if (l.match(/^- \[ \]/)) {
      open++;
      html += '<div class="task">' + l.replace(/^- \[ \]\s*/, '').replace(/\*\*/g, '') + '</div>';
    }
    if (l.match(/^- \[x\]/)) closed++;
  });
  document.getElementById('content').innerHTML = html || '<p style="color:#3fb950;">All clear</p>';
  document.getElementById('stats').textContent = open + ' open / ' + closed + ' closed';
}
fetch('hunter-BACKLOG.md?' + Date.now()).then(r => r.ok ? r.text() : null).then(md => {
  if (md) { render(md); return; }
  document.getElementById('content').innerHTML = '<p style="color:#8b949e;">Synced at build time. Use /backlog in Claude Code for live data.</p>';
}).catch(() => {});
</script>
</body>
</html>
