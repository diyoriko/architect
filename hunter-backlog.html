<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter — Backlog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #080b12; --surface: #0d1117; --surface-2: #131920; --border: #1b2332;
  --text: #e2e8f0; --text-2: #8b949e; --muted: #545d68; --dim: #363f4a;
  --green: #00e676; --red: #ff1744; --amber: #ffab00; --blue: #448aff;
  --purple: #b388ff; --pink: #ff80ab; --cyan: #18ffff;
  --mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
  --sans: 'JetBrains Mono','SF Mono',monospace;
  --glow-green: 0 0 8px rgba(0,230,118,.15);
  --glow-red: 0 0 8px rgba(255,23,68,.15);
  --glow-amber: 0 0 8px rgba(255,171,0,.15);
  --glow-blue: 0 0 8px rgba(68,138,255,.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text-2); padding: 0; min-height: 100vh; position: relative; overflow-x: hidden; line-height: 1.5; }
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(circle at 20% 30%, rgba(0,230,118,.03), transparent 60%),
  radial-gradient(circle at 80% 70%, rgba(68,138,255,.03), transparent 60%);
  pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,230,118,.15),transparent); animation:scanMove 4s ease-in-out infinite; pointer-events:none; z-index:999; }
@keyframes scanMove { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0} }
.shell { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 32px 40px; }

/* Nav */
.nav { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0; overflow-x:auto; margin-bottom:0; }
.nav a { font-size:12px; font-weight:600; padding:12px 20px; color:var(--muted); text-decoration:none; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:1.5px; text-transform:uppercase; transition:all .15s; white-space:nowrap; }
.nav a:hover { color:var(--text-2); }
.nav a.active { color:var(--text); border-bottom-color:var(--green); }

/* Header */
.header { margin-top:20px; margin-bottom:20px; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.header h1 { font-size:14px; font-weight:800; color:var(--green); letter-spacing:3px; text-transform:uppercase; }
.header-live { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
.pulse-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.desc { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.3px; }
.links { display:flex; gap:10px; margin-top:10px; font-size:10px; }
.links a { color:var(--muted); text-decoration:none; padding:3px 10px; border-radius:2px; background:rgba(13,17,23,.82); backdrop-filter:blur(12px); border:1px solid var(--border); transition:all .15s; letter-spacing:.5px; text-transform:uppercase; font-weight:600; }
.links a:hover { color:var(--text); border-color:var(--dim); background:var(--surface-2); box-shadow:var(--glow-blue); }

/* Section label */
.slabel { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--dim); margin:24px 0 10px; display:flex; align-items:center; gap:8px; }
.slabel::after { content:''; flex:1; height:1px; background:var(--border); }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:24px; }
.stat { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:14px 16px; text-align:center; transition:all .2s; }
.stat:hover { background:rgba(19,25,32,.95); }
.stat-value { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.2; letter-spacing:-.5px; }
.stat-label { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:2px; margin-top:4px; font-weight:600; }

/* Sections */
.section { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:2px; margin-bottom:2px; overflow:hidden; transition:box-shadow .2s; }
.section:hover { box-shadow:var(--glow-blue); }
.section-header { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; transition:background .15s; }
.section-header:hover { background:rgba(255,255,255,.015); }
.section-left { display:flex; align-items:center; gap:10px; min-width:0; }
.section-title { font-size:11px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:1px; text-transform:uppercase; }
.section-count { font-size:10px; color:var(--dim); font-family:var(--mono); white-space:nowrap; letter-spacing:.5px; }
.collapse-arrow { font-size:8px; color:var(--dim); transition:transform .2s; flex-shrink:0; }
.section.collapsed .collapse-arrow { transform:rotate(-90deg); }
.section.collapsed .section-body { display:none; }
.progress-bar { height:2px; background:var(--border); overflow:hidden; margin:0 16px; }
.progress-fill { height:100%; transition:width .3s; }
.section-body { padding:8px 16px 14px; }

/* Groups */
.group { margin-bottom:12px; }
.group:last-child { margin-bottom:0; }
.group-title { font-size:9px; font-weight:700; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:1.5px; }
.priority-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* Tasks */
.task { display:flex; align-items:flex-start; gap:10px; padding:5px 10px; border-radius:2px; font-size:11px; transition:all .15s; }
.task:hover { background:rgba(255,255,255,.02); }
.task-check { width:14px; height:14px; border-radius:2px; border:2px solid var(--border); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; }
.task-done .task-check { background:var(--green); border-color:var(--green); }
.task-done .task-check::after { content:'\2713'; color:#000; font-size:9px; font-weight:700; }
.task-content { flex:1; min-width:0; }
.task-title { font-weight:600; color:var(--text-2); }
.task-desc { color:var(--dim); margin-left:4px; }
.task-done .task-title, .task-done .task-desc { color:var(--dim); text-decoration:line-through; text-decoration-color:rgba(54,63,74,.6); }

/* Moderation UI */
.task.moderable { border-left:2px solid var(--blue); padding-left:12px; position:relative; }
.task.moderable[data-source="strategist"] { border-left-color:var(--blue); }
.task.moderable[data-source="mega-review"] { border-left-color:var(--red); }
.task.moderable[data-source="coderabbit"] { border-left-color:var(--purple); }
.source-badge { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:1px 6px; border-radius:2px; margin-left:6px; white-space:nowrap; vertical-align:middle; }
.source-badge.strategist { background:rgba(68,138,255,.12); color:var(--blue); }
.source-badge.mega-review { background:rgba(255,23,68,.1); color:var(--red); }
.source-badge.coderabbit { background:rgba(179,136,255,.12); color:var(--purple); }
.mod-actions { display:inline-flex; gap:4px; margin-left:8px; flex-shrink:0; }
.mod-btn { font-size:10px; padding:1px 8px; border-radius:2px; border:1px solid var(--border); background:transparent; cursor:pointer; font-family:var(--sans); transition:all .15s; white-space:nowrap; }
.mod-btn:hover { background:var(--surface-2); }
.mod-btn.keep { color:var(--green); border-color:rgba(0,230,118,.2); }
.mod-btn.keep:hover { background:rgba(0,230,118,.1); box-shadow:var(--glow-green); }
.mod-btn.remove { color:var(--red); border-color:rgba(255,23,68,.2); }
.mod-btn.remove:hover { background:rgba(255,23,68,.08); box-shadow:var(--glow-red); }
.mod-btn:disabled { opacity:0.4; cursor:default; }
.task.mod-removing { animation:modFadeOut .3s ease forwards; }
.task.mod-kept .source-badge, .task.mod-kept .mod-actions { display:none; }
.task.mod-kept { border-left-color:var(--border); }
@keyframes modFadeOut { to { opacity:0; height:0; padding:0; margin:0; overflow:hidden; } }

/* Footer */
.footer { margin-top:24px; padding-top:12px; border-top:1px solid var(--border); font-size:9px; color:var(--dim); display:flex; justify-content:space-between; letter-spacing:.5px; text-transform:uppercase; }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--dim); font-size:11px; letter-spacing:1px; text-transform:uppercase; }

@media (max-width:600px) {
  .shell { padding:12px; }
  .stats { grid-template-columns:repeat(3,1fr); }
  .section-title { font-size:10px; }
}
</style>
</head>
<body>
<div class="shell">

<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a class="active" href="hunter-backlog.html">Hunter</a>
  <a href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a href="portfolio-backlog.html">Portfolio</a>
</div>

<div class="header">
  <div class="header-top">
    <h1>AI Ловец Вакансий</h1>
    <div class="header-live"><span class="pulse-dot"></span><span id="live-time">--:--</span></div>
  </div>
  <div class="desc">Telegram-бот для поиска вакансий. hh.ru + Habr + Getmatch, AI-скоринг, сопроводительные. Freemium + Telegram Stars.</div>
  <div class="links">
    <a href="https://t.me/jobhunt_ai_bot" target="_blank" rel="noopener">@jobhunt_ai_bot</a>
    <a href="https://hunter-production-0b65.up.railway.app" target="_blank" rel="noopener">Railway</a>
  </div>
</div>

<div class="stats" id="stats"><div class="loading">Loading...</div></div>
<div id="sections"><div class="loading">Loading backlog...</div></div>

<div class="footer">
  <span id="footer-updated">--</span>
  <span>auto-refresh 30s</span>
</div>

</div>

<script>
// === Helpers ===
function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
function toggle(el) { el.classList.toggle('collapsed'); }

// === Parser ===
function parseBacklog(md) {
  const lines = md.split('\n');
  const sections = [];
  let current = null, group = null;

  for (const line of lines) {
    if (/^---\s*$/.test(line)) continue;

    // Skip metadata
    if (/^## Метаданные/.test(line)) { current = null; group = null; continue; }

    const h2 = line.match(/^## (.+)/);
    if (h2) {
      // If we were in metadata, stay null
      current = { title: h2[1].trim(), groups: [], tasks: [] };
      sections.push(current);
      group = null;
      continue;
    }

    const h3 = line.match(/^### (.+)/);
    if (h3 && current) {
      group = { title: h3[1].trim(), priority: extractPriority(h3[1]), tasks: [] };
      current.groups.push(group);
      continue;
    }

    const task = line.match(/^- \[([ x])\]\s+(.+)/);
    if (task && current) {
      const done = task[1] === 'x';
      const raw = task[2];
      let title = raw, desc = '';

      const bold = raw.match(/^\*\*(.+?)\*\*\s*(?:[—\-]\s*(.*))?/);
      if (bold) {
        title = bold[1];
        desc = bold[2] || '';
      } else {
        const dash = raw.indexOf(' — ');
        if (dash > 0) { title = raw.slice(0, dash); desc = raw.slice(dash + 3); }
      }

      const t = { title, desc, done };
      if (group) group.tasks.push(t);
      else current.tasks.push(t);
    }
  }

  // Filter out metadata section if it slipped through
  return sections.filter(s => !/^Метаданные/.test(s.title));
}

function extractPriority(title) {
  const m = title.match(/^P(\d)/i);
  return m ? parseInt(m[1]) : 9;
}

function priorityColor(p) {
  if (p === 0) return 'var(--red)';
  if (p === 1) return 'var(--amber)';
  if (p === 2) return 'var(--green)';
  return 'var(--dim)';
}

// === Stats ===
function renderStats(sections) {
  let open = 0, done = 0, p0 = 0;
  for (const sec of sections) {
    for (const t of sec.tasks) { if (t.done) done++; else open++; }
    for (const g of sec.groups) {
      for (const t of g.tasks) {
        if (t.done) done++;
        else { open++; if (g.priority === 0) p0++; }
      }
    }
  }
  const total = open + done;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('stats').innerHTML = [
    { v: open, l: 'Open', c: 'var(--amber)' },
    { v: done, l: 'Done', c: 'var(--green)' },
    { v: p0, l: 'P0', c: 'var(--red)' },
    { v: pct + '%', l: 'Progress', c: 'var(--blue)' },
    { v: total, l: 'Total', c: 'var(--text)' },
  ].map(s => `<div class="stat"><div class="stat-value" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
}

// === Sections ===
function renderSections(sections) {
  let firstOpenFound = false;
  const html = sections.map((sec, i) => {
    const allTasks = [...sec.tasks, ...sec.groups.flatMap(g => g.tasks)];
    const doneCount = allTasks.filter(t => t.done).length;
    const total = allTasks.length;
    const pct = total ? Math.round(doneCount / total * 100) : 0;
    const allDone = total > 0 && doneCount === total;
    const hasOpen = doneCount < total;

    let collapsed;
    if (allDone) { collapsed = true; }
    else if (!firstOpenFound && hasOpen) { collapsed = false; firstOpenFound = true; }
    else { collapsed = true; }

    const fill = allDone ? 'var(--green)' : 'var(--blue)';

    let body = '';
    // Ungrouped tasks
    if (sec.tasks.length) {
      body += sec.tasks.map(renderTask).join('');
    }
    // Groups
    body += sec.groups.map(g => {
      const color = priorityColor(g.priority);
      return `<div class="group">
        <div class="group-title"><span class="priority-dot" style="background:${color}"></span>${esc(g.title)}</div>
        ${g.tasks.map(renderTask).join('')}
      </div>`;
    }).join('');

    return `<div class="section${collapsed ? ' collapsed' : ''}" id="sec-${i}">
      <div class="section-header" onclick="toggle(this.parentElement)">
        <div class="section-left">
          <span class="section-title">${esc(sec.title)}</span>
          <span class="section-count">${doneCount}/${total}</span>
        </div>
        <span class="collapse-arrow">&#x25BC;</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fill}"></div></div>
      <div class="section-body">${body}</div>
    </div>`;
  }).join('');

  document.getElementById('sections').innerHTML = html;
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'hunter';

function detectSource(title, desc) {
  const full = title + ' ' + (desc || '');
  for (const tag of SOURCE_TAGS) {
    if (full.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(t) {
  const source = t.done ? null : detectSource(t.title, t.desc);
  const base = t.done ? 'task task-done' : 'task';
  const cls = source ? base + ' moderable' : base;
  const dataAttr = source ? ` data-source="${source}"` : '';
  const cleanTitle = source ? stripSourceTag(t.title, source) : t.title;
  const cleanDesc = source && t.desc ? stripSourceTag(t.desc, source) : (t.desc || '');
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = (t.title + (t.desc ? ' — ' + t.desc : '')).replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';
  return `<div class="${cls}"${dataAttr}>
    <div class="task-check"></div>
    <div class="task-content"><span class="task-title">${esc(cleanTitle)}</span>${badge}${cleanDesc ? `<span class="task-desc"> &mdash; ${esc(cleanDesc)}</span>` : ''}${actions}</div>
  </div>`;
}

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

// === Load ===
async function loadBacklog() {
  try {
    const res = await fetch('hunter-BACKLOG.md?' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    const sections = parseBacklog(md);
    renderStats(sections);
    renderSections(sections);
    const now = new Date();
    const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('footer-updated').textContent = 'Updated ' + time;
    document.getElementById('live-time').textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('sections').innerHTML = '<div class="loading">Failed to load backlog: ' + esc(e.message) + '</div>';
  }
}

loadBacklog();
setInterval(loadBacklog, 30000);
</script>
</body>
</html>
