<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio -- Backlog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #080b12; --surface: #0d1117; --surface-2: #131920; --border: #1b2332;
  --text: #e2e8f0; --text-2: #8b949e; --muted: #545d68; --dim: #363f4a;
  --green: #00e676; --red: #ff1744; --amber: #ffab00; --blue: #448aff;
  --purple: #b388ff; --pink: #ff80ab; --cyan: #18ffff;
  --mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
  --sans: 'JetBrains Mono','SF Mono',monospace;
  --glow-green: 0 0 8px rgba(0,230,118,.15);
  --glow-red: 0 0 8px rgba(255,23,68,.15);
  --glow-amber: 0 0 8px rgba(255,171,0,.15);
  --glow-blue: 0 0 8px rgba(68,138,255,.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text-2);
  padding: 0; min-height: 100vh; position: relative; overflow-x: hidden; line-height: 1.5;
}
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(circle at 20% 30%, rgba(0,230,118,.03), transparent 60%),
  radial-gradient(circle at 80% 70%, rgba(68,138,255,.03), transparent 60%);
  pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,230,118,.15),transparent); animation:scanMove 4s ease-in-out infinite; pointer-events:none; z-index:999; }
@keyframes scanMove { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0} }
.shell { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 32px 40px; }

a { color: var(--muted); text-decoration: none; }
a:hover { color: var(--text-2); }

/* Nav */
.nav { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0; overflow-x:auto; margin-bottom:0; }
.nav a { font-size:12px; font-weight:600; padding:12px 20px; color:var(--muted); text-decoration:none; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:1.5px; text-transform:uppercase; transition:all .15s; white-space:nowrap; }
.nav a:hover { color:var(--text-2); }
.nav a.active { color:var(--text); border-bottom-color:var(--red); }

/* Header */
.header { margin-top:20px; margin-bottom:20px; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
h1 { font-size:14px; font-weight:800; letter-spacing:3px; color:var(--red); text-transform:uppercase; }
.meta { font-size:10px; color:var(--dim); display:flex; align-items:center; gap:6px; letter-spacing:1px; text-transform:uppercase; }
.live { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
.desc-text { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.3px; }
.header-links { display:flex; gap:10px; margin-top:10px; font-size:10px; }
.header-links a { color:var(--muted); text-decoration:none; padding:3px 10px; border-radius:2px; background:rgba(13,17,23,.82); backdrop-filter:blur(12px); border:1px solid var(--border); transition:all .15s; letter-spacing:.5px; text-transform:uppercase; font-weight:600; }
.header-links a:hover { color:var(--text); border-color:var(--dim); background:var(--surface-2); box-shadow:var(--glow-red); }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:24px; }
.stat { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:14px 16px; text-align:center; transition:all .2s; }
.stat:hover { background:rgba(19,25,32,.95); }
.stat-value { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
.stat-label { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:2px; margin-top:4px; font-weight:600; }

/* Sections */
.section { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:2px; margin-bottom:2px; overflow:hidden; transition:box-shadow .2s; }
.section:hover { box-shadow:var(--glow-red); }
.section-header {
  padding:12px 16px; display:flex; justify-content:space-between;
  align-items:center; cursor:pointer; user-select:none;
}
.section-header:hover { background:rgba(255,255,255,.015); }
.section-title { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.section-badge { font-size:8px; padding:2px 8px; border-radius:2px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-left:10px; }
.badge-active { background:rgba(255,23,68,.12); color:var(--red); }
.badge-done { background:rgba(0,230,118,.1); color:var(--green); }
.badge-planned { background:rgba(54,63,74,.3); color:var(--dim); }
.section-body { padding:0 16px 14px; }
.collapse-icon { transition:transform .2s; color:var(--dim); font-size:8px; }
.collapsed .collapse-icon { transform:rotate(-90deg); }
.collapsed .section-body { display:none; }

/* Progress bar */
.progress-bar { height:2px; background:var(--border); overflow:hidden; margin-top:4px; }
.progress-fill { height:100%; background:var(--red); transition:width .3s; }

/* Groups */
.group { margin-bottom:14px; }
.group:last-child { margin-bottom:0; }
.group-title { font-size:9px; font-weight:700; color:var(--text-2); margin-bottom:8px; display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:1.5px; }
.priority-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* Tasks */
.task { display:flex; align-items:flex-start; gap:10px; padding:5px 12px; border-radius:2px; margin-bottom:2px; font-size:11px; transition:all .15s; }
.task:hover { background:rgba(255,255,255,.02); }
.task-check {
  width:14px; height:14px; border-radius:2px; border:2px solid var(--border);
  flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700;
}
.task-content { flex:1; min-width:0; }
.task-text { flex:1; }

/* Done */
.task-done .task-check { background:var(--green); border-color:var(--green); }
.task-done .task-check::after { content:'\2713'; color:#000; }
.task-done .task-text { color:var(--dim); text-decoration:line-through; text-decoration-color:rgba(54,63,74,.6); }

/* Cancelled */
.task-cancelled .task-check { background:var(--dim); border-color:var(--dim); }
.task-cancelled .task-check::after { content:'\00D7'; color:var(--muted); }
.task-cancelled .task-text { color:var(--dim); text-decoration:line-through; text-decoration-color:rgba(54,63,74,.6); }

/* In progress */
.task-progress { background:rgba(68,138,255,.04); }
.task-progress .task-check { border-color:var(--blue); background:transparent; }
.task-progress .task-check::after { content:''; width:6px; height:6px; border-radius:50%; background:var(--amber); }

/* Moderation UI */
.task.moderable { border-left:2px solid var(--blue); padding-left:12px; position:relative; }
.task.moderable[data-source="strategist"] { border-left-color:var(--blue); }
.task.moderable[data-source="mega-review"] { border-left-color:var(--red); }
.task.moderable[data-source="coderabbit"] { border-left-color:var(--purple); }
.source-badge { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:1px 6px; border-radius:2px; margin-left:6px; white-space:nowrap; vertical-align:middle; }
.source-badge.strategist { background:rgba(68,138,255,.12); color:var(--blue); }
.source-badge.mega-review { background:rgba(255,23,68,.1); color:var(--red); }
.source-badge.coderabbit { background:rgba(179,136,255,.12); color:var(--purple); }
.mod-actions { display:inline-flex; gap:4px; margin-left:8px; flex-shrink:0; }
.mod-btn { font-size:10px; padding:1px 8px; border-radius:2px; border:1px solid var(--border); background:transparent; cursor:pointer; font-family:var(--sans); transition:all .15s; white-space:nowrap; }
.mod-btn:hover { background:var(--surface-2); }
.mod-btn.keep { color:var(--green); border-color:rgba(0,230,118,.2); }
.mod-btn.keep:hover { background:rgba(0,230,118,.1); box-shadow:var(--glow-green); }
.mod-btn.remove { color:var(--red); border-color:rgba(255,23,68,.2); }
.mod-btn.remove:hover { background:rgba(255,23,68,.08); box-shadow:var(--glow-red); }
.mod-btn:disabled { opacity:0.4; cursor:default; }
.task.mod-removing { animation:modFadeOut .3s ease forwards; }
.task.mod-kept .source-badge, .task.mod-kept .mod-actions { display:none; }
.task.mod-kept { border-left-color:var(--border); }
@keyframes modFadeOut { to { opacity:0; height:0; padding:0; margin:0; overflow:hidden; } }

@media (max-width:600px) {
  .stats { grid-template-columns:repeat(3,1fr); }
  .shell { padding:12px; }
}
</style>
</head>
<body>
<div class="shell">

<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a class="active" href="portfolio-backlog.html">Portfolio</a>
</div>
<div class="header">
  <div class="header-top">
    <h1>Portfolio</h1>
    <div class="meta"><span class="live"></span><span id="lastUpdate">--</span></div>
  </div>
  <div class="desc-text">Портфолио diyor.design. HTML/CSS/JS, GitHub Pages. 7 кейсов: Skysmart, Teletype, ENXT, SAMI, Hunter, Prosto, Kombo.</div>
  <div class="header-links">
    <a href="https://diyor.design" target="_blank">diyor.design</a>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="content"></div>

</div>

<script>
const SRC = 'portfolio-BACKLOG.md?' + Date.now();
const REFRESH = 30000;

function parseBacklogMd(md) {
  const lines = md.split('\n');
  const sections = [];
  let cur = null, grp = null;
  for (const line of lines) {
    const sm = line.match(/^## (.+)/);
    if (sm) {
      const name = sm[1].trim();
      let pri = 'p2', status = 'planned';
      if (/^P0/i.test(name)) { pri = 'p0'; status = 'active'; }
      else if (/^P1/i.test(name)) { pri = 'p1'; status = 'active'; }
      else if (/^P2/i.test(name)) pri = 'p2';
      else if (/^P3/i.test(name)) pri = 'p3';
      cur = { name, priority: pri, status, groups: [] };
      sections.push(cur); grp = null; continue;
    }
    const gm = line.match(/^### (.+)/);
    if (gm && cur) { grp = { title: gm[1].trim(), tasks: [] }; cur.groups.push(grp); continue; }
    if (/^---\s*$/.test(line)) { grp = null; continue; }
    const tm = line.match(/^- \[([ x~\u2014])\]\s+(.+)/);
    if (tm && grp) {
      const s = tm[1]; const raw = tm[2].trim();
      grp.tasks.push({ text: raw, done: s === 'x', cancelled: s === '\u2014', progress: s === '~' });
    }
  }
  return sections;
}

function count(sections) {
  let open = 0, done = 0, cancelled = 0, progress = 0;
  for (const s of sections) for (const g of s.groups) for (const t of g.tasks) {
    if (t.done) done++; else if (t.cancelled) cancelled++; else if (t.progress) { progress++; open++; } else open++;
  }
  const active = done + open;
  return { open, done, cancelled, progress, pct: active ? Math.round(done / active * 100) : 0 };
}

function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }

function renderStats(sections) {
  const c = count(sections);
  const items = [
    { v: c.open, l: 'Open', c: 'var(--text)' },
    { v: c.done, l: 'Done', c: 'var(--green)' },
    { v: c.cancelled, l: 'Cancelled', c: 'var(--dim)' },
    { v: c.progress, l: 'In Progress', c: 'var(--amber)' },
    { v: c.pct + '%', l: 'Progress', c: 'var(--red)' },
  ];
  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat"><div class="stat-value" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`
  ).join('');
}

function groupColor(title) {
  if (/^BUG/i.test(title)) return 'var(--red)';
  if (/^CASE/i.test(title)) return 'var(--blue)';
  if (/^DEV/i.test(title)) return 'var(--amber)';
  if (/^DEPLOY/i.test(title)) return 'var(--green)';
  if (/^STRAT/i.test(title)) return 'var(--purple)';
  if (/^POLISH/i.test(title)) return 'var(--green)';
  if (/^SEO/i.test(title)) return 'var(--pink)';
  if (/^FIGMA/i.test(title)) return 'var(--purple)';
  if (/^A11Y/i.test(title)) return 'var(--amber)';
  if (/^UX/i.test(title)) return 'var(--blue)';
  if (/^SYNC/i.test(title)) return 'var(--muted)';
  if (/^CONTENT/i.test(title)) return 'var(--pink)';
  if (/^DIST/i.test(title)) return 'var(--green)';
  if (/^ABOUT/i.test(title)) return 'var(--blue)';
  return 'var(--muted)';
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'portfolio';

function detectSource(text) {
  for (const tag of SOURCE_TAGS) {
    if (text.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(t) {
  const isActionable = !t.done && !t.cancelled;
  const source = isActionable ? detectSource(t.text) : null;
  let cls = '';
  if (t.done) cls = 'task-done';
  else if (t.cancelled) cls = 'task-cancelled';
  else if (t.progress) cls = 'task-progress';
  const modCls = source ? ' moderable' : '';
  const dataAttr = source ? ` data-source="${source}"` : '';
  const cleanText = source ? stripSourceTag(t.text, source) : t.text;
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = t.text.replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';
  return `<div class="task ${cls}${modCls}"${dataAttr}><div class="task-check"></div><div class="task-content"><span class="task-text">${esc(cleanText)}</span>${badge}${actions}</div></div>`;
}

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

function renderSection(sec) {
  const tasks = sec.groups.flatMap(g => g.tasks);
  const active = tasks.filter(t => !t.cancelled);
  const d = active.filter(t => t.done).length;
  const tot = active.length;
  const pct = tot ? Math.round(d / tot * 100) : 0;
  const allDone = pct === 100;
  const badge = allDone ? 'badge-done' : sec.status === 'active' ? 'badge-active' : 'badge-planned';
  const badgeText = allDone ? 'done' : sec.status;

  return `<div class="section${allDone ? ' collapsed' : ''}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <div><span class="section-title">${esc(sec.name)}</span><span class="section-badge ${badge}">${badgeText}</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:10px;color:var(--muted);letter-spacing:.5px">${d}/${tot}</span>
        <span class="collapse-icon">&#x25BC;</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section-body">${sec.groups.map(g => `<div class="group">
      <div class="group-title"><span class="priority-dot" style="background:${groupColor(g.title)}"></span>${esc(g.title)}</div>
      ${g.tasks.map(renderTask).join('')}
    </div>`).join('')}</div>
  </div>`;
}

async function load() {
  try {
    const res = await fetch(SRC);
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    const sections = parseBacklogMd(md);
    renderStats(sections);
    document.getElementById('content').innerHTML = sections.map(renderSection).join('');
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('content').innerHTML = '<p style="color:var(--muted);padding:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase">Failed to load backlog</p>';
  }
}

load();
setInterval(() => { location.replace(location.href); }, REFRESH);
</script>
</body>
</html>
