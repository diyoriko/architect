<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio -- Backlog</title>
<style>
  :root {
    --bg: #0F172A; --surface: #1E293B; --surface-2: #273549; --border: #334155;
    --text: #F8FAFC; --text-2: #CBD5E1; --muted: #94A3B8; --dim: #64748B;
    --green: #22C55E; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #A78BFA; --pink: #F472B6;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    padding: 24px; max-width: 960px; margin: 0 auto; line-height: 1.5;
  }
  a { color: var(--muted); text-decoration: none; }
  a:hover { color: var(--text-2); }

  /* Header */
  .nav { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; }
  .nav a { font-size: 13px; padding: 8px 14px; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
  .nav a:hover { color: var(--text-2); }
  .nav a.active { color: var(--text); border-bottom-color: var(--red); }
  .header { margin-bottom: 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--red); }
  .meta { font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 6px; }
  .live { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .desc-text { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .header-links { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; }
  .header-links a { color: var(--muted); text-decoration: none; padding: 2px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); transition: all 0.15s; }
  .header-links a:hover { color: var(--text); border-color: var(--dim); background: var(--surface-2); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  /* Sections */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .section-header {
    padding: 16px 20px; display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; user-select: none;
  }
  .section-header:hover { background: rgba(255,255,255,0.03); }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 10px; }
  .badge-active { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-planned { background: rgba(148,163,184,0.15); color: var(--muted); }
  .section-body { padding: 0 20px 16px; }
  .collapse-icon { transition: transform 0.2s; color: var(--muted); }
  .collapsed .collapse-icon { transform: rotate(-90deg); }
  .collapsed .section-body { display: none; }

  /* Progress bar */
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.3s; }

  /* Groups */
  .group { margin-bottom: 16px; }
  .group:last-child { margin-bottom: 0; }
  .group-title { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Tasks */
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 6px; margin-bottom: 2px; font-size: 14px; transition: background 0.15s; }
  .task:hover { background: rgba(255,255,255,0.03); }
  .task-check {
    width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border);
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .task-content { flex: 1; min-width: 0; }
  .task-text { flex: 1; }

  /* Done */
  .task-done .task-check { background: var(--green); border-color: var(--green); }
  .task-done .task-check::after { content: '\2713'; color: white; }
  .task-done .task-text { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,0.4); }

  /* Cancelled */
  .task-cancelled .task-check { background: var(--dim); border-color: var(--dim); }
  .task-cancelled .task-check::after { content: '\00D7'; color: var(--muted); }
  .task-cancelled .task-text { color: var(--dim); text-decoration: line-through; text-decoration-color: rgba(100,116,139,0.4); }

  /* In progress */
  .task-progress { background: rgba(59,130,246,0.05); }
  .task-progress .task-check { border-color: var(--blue); background: transparent; }
  .task-progress .task-check::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }

  /* Moderation UI */
  .task.moderable { border-left: 3px solid var(--blue); padding-left: 12px; position: relative; }
  .task.moderable[data-source="strategist"] { border-left-color: var(--blue); }
  .task.moderable[data-source="mega-review"] { border-left-color: var(--red); }
  .task.moderable[data-source="coderabbit"] { border-left-color: var(--purple); }
  .source-badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; vertical-align: middle; }
  .source-badge.strategist { background: rgba(59,130,246,0.15); color: var(--blue); }
  .source-badge.mega-review { background: rgba(239,68,68,0.12); color: var(--red); }
  .source-badge.coderabbit { background: rgba(167,139,250,0.15); color: var(--purple); }
  .mod-actions { display: inline-flex; gap: 4px; margin-left: 8px; flex-shrink: 0; }
  .mod-btn { font-size: 11px; padding: 1px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: var(--sans); transition: all 0.15s; white-space: nowrap; }
  .mod-btn:hover { background: var(--surface-2); }
  .mod-btn.keep { color: var(--green); border-color: rgba(34,197,94,0.3); }
  .mod-btn.keep:hover { background: rgba(34,197,94,0.12); }
  .mod-btn.remove { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .mod-btn.remove:hover { background: rgba(239,68,68,0.1); }
  .mod-btn:disabled { opacity: 0.4; cursor: default; }
  .task.mod-removing { animation: modFadeOut 0.3s ease forwards; }
  .task.mod-kept .source-badge, .task.mod-kept .mod-actions { display: none; }
  .task.mod-kept { border-left-color: var(--border); }
  @keyframes modFadeOut { to { opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; } }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    body { padding: 16px; }
  }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a class="active" href="portfolio-backlog.html">Portfolio</a>
</div>
<div class="header">
  <div class="header-top">
    <h1>Portfolio</h1>
    <div class="meta"><span class="live"></span><span id="lastUpdate">--</span></div>
  </div>
  <div class="desc-text">Портфолио diyor.design. HTML/CSS/JS, GitHub Pages. 7 кейсов: Skysmart, Teletype, ENXT, SAMI, Hunter, Prosto, Kombo.</div>
  <div class="header-links">
    <a href="https://diyor.design" target="_blank">diyor.design</a>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="content"></div>

<script>
const SRC = 'portfolio-BACKLOG.md?' + Date.now();
const REFRESH = 30000;

function parseBacklogMd(md) {
  const lines = md.split('\n');
  const sections = [];
  let cur = null, grp = null;
  for (const line of lines) {
    const sm = line.match(/^## (.+)/);
    if (sm) {
      const name = sm[1].trim();
      let pri = 'p2', status = 'planned';
      if (/^P0/i.test(name)) { pri = 'p0'; status = 'active'; }
      else if (/^P1/i.test(name)) { pri = 'p1'; status = 'active'; }
      else if (/^P2/i.test(name)) pri = 'p2';
      else if (/^P3/i.test(name)) pri = 'p3';
      cur = { name, priority: pri, status, groups: [] };
      sections.push(cur); grp = null; continue;
    }
    const gm = line.match(/^### (.+)/);
    if (gm && cur) { grp = { title: gm[1].trim(), tasks: [] }; cur.groups.push(grp); continue; }
    if (/^---\s*$/.test(line)) { grp = null; continue; }
    const tm = line.match(/^- \[([ x~\u2014])\]\s+(.+)/);
    if (tm && grp) {
      const s = tm[1]; const raw = tm[2].trim();
      grp.tasks.push({ text: raw, done: s === 'x', cancelled: s === '\u2014', progress: s === '~' });
    }
  }
  return sections;
}

function count(sections) {
  let open = 0, done = 0, cancelled = 0, progress = 0;
  for (const s of sections) for (const g of s.groups) for (const t of g.tasks) {
    if (t.done) done++; else if (t.cancelled) cancelled++; else if (t.progress) { progress++; open++; } else open++;
  }
  const active = done + open;
  return { open, done, cancelled, progress, pct: active ? Math.round(done / active * 100) : 0 };
}

function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }

function renderStats(sections) {
  const c = count(sections);
  const items = [
    { v: c.open, l: 'Open', c: 'var(--text)' },
    { v: c.done, l: 'Done', c: 'var(--green)' },
    { v: c.cancelled, l: 'Cancelled', c: 'var(--dim)' },
    { v: c.progress, l: 'In Progress', c: 'var(--amber)' },
    { v: c.pct + '%', l: 'Progress', c: 'var(--red)' },
  ];
  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat"><div class="stat-value" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`
  ).join('');
}

function groupColor(title) {
  if (/^BUG/i.test(title)) return 'var(--red)';
  if (/^CASE/i.test(title)) return 'var(--blue)';
  if (/^DEV/i.test(title)) return 'var(--amber)';
  if (/^DEPLOY/i.test(title)) return 'var(--green)';
  if (/^STRAT/i.test(title)) return 'var(--purple)';
  if (/^POLISH/i.test(title)) return 'var(--green)';
  if (/^SEO/i.test(title)) return 'var(--pink)';
  if (/^FIGMA/i.test(title)) return 'var(--purple)';
  if (/^A11Y/i.test(title)) return 'var(--amber)';
  if (/^UX/i.test(title)) return 'var(--blue)';
  if (/^SYNC/i.test(title)) return 'var(--muted)';
  if (/^CONTENT/i.test(title)) return 'var(--pink)';
  if (/^DIST/i.test(title)) return 'var(--green)';
  if (/^ABOUT/i.test(title)) return 'var(--blue)';
  return 'var(--muted)';
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'portfolio';

function detectSource(text) {
  for (const tag of SOURCE_TAGS) {
    if (text.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(t) {
  const isActionable = !t.done && !t.cancelled;
  const source = isActionable ? detectSource(t.text) : null;
  let cls = '';
  if (t.done) cls = 'task-done';
  else if (t.cancelled) cls = 'task-cancelled';
  else if (t.progress) cls = 'task-progress';
  const modCls = source ? ' moderable' : '';
  const dataAttr = source ? ` data-source="${source}"` : '';
  const cleanText = source ? stripSourceTag(t.text, source) : t.text;
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = t.text.replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';
  return `<div class="task ${cls}${modCls}"${dataAttr}><div class="task-check"></div><div class="task-content"><span class="task-text">${esc(cleanText)}</span>${badge}${actions}</div></div>`;
}

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

function renderSection(sec) {
  const tasks = sec.groups.flatMap(g => g.tasks);
  const active = tasks.filter(t => !t.cancelled);
  const d = active.filter(t => t.done).length;
  const tot = active.length;
  const pct = tot ? Math.round(d / tot * 100) : 0;
  const allDone = pct === 100;
  const badge = allDone ? 'badge-done' : sec.status === 'active' ? 'badge-active' : 'badge-planned';
  const badgeText = allDone ? 'done' : sec.status;

  return `<div class="section${allDone ? ' collapsed' : ''}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <div><span class="section-title">${esc(sec.name)}</span><span class="section-badge ${badge}">${badgeText}</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:var(--muted)">${d}/${tot}</span>
        <span class="collapse-icon">&#x25BC;</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section-body">${sec.groups.map(g => `<div class="group">
      <div class="group-title"><span class="priority-dot" style="background:${groupColor(g.title)}"></span>${esc(g.title)}</div>
      ${g.tasks.map(renderTask).join('')}
    </div>`).join('')}</div>
  </div>`;
}

async function load() {
  try {
    const res = await fetch(SRC);
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    const sections = parseBacklogMd(md);
    renderStats(sections);
    document.getElementById('content').innerHTML = sections.map(renderSection).join('');
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('content').innerHTML = '<p style="color:var(--muted);padding:20px">Failed to load backlog</p>';
  }
}

load();
setInterval(() => { location.replace(location.href); }, REFRESH);
</script>
</body>
</html>
