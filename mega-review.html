<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health — Architect</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #080b12; --surface: #0d1117; --surface-2: #131920; --border: #1b2332;
  --text: #e2e8f0; --text-2: #8b949e; --muted: #545d68; --dim: #363f4a;
  --green: #00e676; --red: #ff1744; --amber: #ffab00; --blue: #448aff;
  --purple: #b388ff; --pink: #ff80ab; --cyan: #18ffff;
  --mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
  --sans: 'JetBrains Mono','SF Mono',monospace;
  --glow-green: 0 0 8px rgba(0,230,118,.15);
  --glow-red: 0 0 8px rgba(255,23,68,.15);
  --glow-amber: 0 0 8px rgba(255,171,0,.15);
  --glow-blue: 0 0 8px rgba(68,138,255,.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text-2); padding: 0; min-height: 100vh; position: relative; overflow-x: hidden; line-height: 1.5; }
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(circle at 20% 30%, rgba(0,230,118,.03), transparent 60%),
  radial-gradient(circle at 80% 70%, rgba(68,138,255,.03), transparent 60%);
  pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,230,118,.15),transparent); animation:scanMove 4s ease-in-out infinite; pointer-events:none; z-index:999; }
@keyframes scanMove { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0} }
.shell { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 32px 40px; }

/* Nav */
.nav { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0; overflow-x:auto; margin-bottom:0; }
.nav a { font-size:12px; font-weight:600; padding:12px 20px; color:var(--muted); text-decoration:none; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:1.5px; text-transform:uppercase; transition:all .15s; white-space:nowrap; }
.nav a:hover { color:var(--text-2); }
.nav a.active { color:var(--text); border-bottom-color:var(--blue); }

/* Header */
.hdr { display:flex; justify-content:space-between; align-items:baseline; margin-top:20px; margin-bottom:4px; }
.hdr h1 { font-size:14px; font-weight:800; color:var(--text); letter-spacing:3px; text-transform:uppercase; }
.hdr-st { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
.pulse { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.sub { font-size:11px; color:var(--muted); margin-bottom:20px; letter-spacing:.3px; }

/* Section label */
.stitle { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--dim); margin:24px 0 10px; display:flex; align-items:center; gap:8px; }
.stitle::after { content:''; flex:1; height:1px; background:var(--border); }

/* Scorecard */
.scorecard { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:2px; overflow-x:auto; margin-bottom:24px; }
.scorecard table { width:100%; border-collapse:collapse; min-width:500px; }
.scorecard th { padding:10px 14px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--dim); text-align:center; border-bottom:1px solid var(--border); }
.scorecard th:first-child { text-align:left; }
.scorecard td { padding:10px 14px; text-align:center; border-top:1px solid var(--border); font-size:11px; }
.scorecard tr:first-child td { border-top:none; }
.scorecard td:first-child { text-align:left; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:10px; }
.scorecard tr:hover td { background:rgba(255,255,255,.015); }
.sc-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.sc-dot.green { background:var(--green); box-shadow:var(--glow-green); }
.sc-dot.amber { background:var(--amber); box-shadow:var(--glow-amber); }
.sc-dot.red { background:var(--red); box-shadow:var(--glow-red); }
.sc-dot.gray { background:var(--dim); opacity:0.3; }

/* Stats */
.stats-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.stat-pill { display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:2px; background:rgba(13,17,23,.82); backdrop-filter:blur(12px); border:1px solid var(--border); transition:all .2s; }
.stat-pill:hover { background:rgba(19,25,32,.95); }
.stat-pill-n { font-size:18px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
.stat-pill-l { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; }
.stat-pill.red { border-color:rgba(255,23,68,.2); } .stat-pill.red .stat-pill-n { color:var(--red); }
.stat-pill.red:hover { box-shadow:var(--glow-red); }
.stat-pill.amber { border-color:rgba(255,171,0,.2); } .stat-pill.amber .stat-pill-n { color:var(--amber); }
.stat-pill.amber:hover { box-shadow:var(--glow-amber); }
.stat-pill.gray .stat-pill-n { color:var(--muted); }
.stat-pill.green { border-color:rgba(0,230,118,.2); } .stat-pill.green .stat-pill-n { color:var(--green); }
.stat-pill.green:hover { box-shadow:var(--glow-green); }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); overflow-x:auto; }
.tab { padding:10px 16px; font-size:10px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; white-space:nowrap; letter-spacing:1px; text-transform:uppercase; }
.tab:hover { color:var(--text-2); }
.tab.active { color:var(--text); }
.tab .badge { font-size:9px; padding:1px 6px; border-radius:2px; background:var(--surface-2); color:var(--muted); margin-left:6px; letter-spacing:.5px; }
.tab.active .badge { background:var(--blue); color:#fff; }

.panel { display:none; }
.panel.active { display:block; }

.review-date { font-size:10px; font-weight:700; color:var(--blue); margin:20px 0 10px; display:flex; align-items:center; gap:8px; letter-spacing:1px; text-transform:uppercase; }
.review-date-count { font-size:8px; padding:2px 8px; border-radius:2px; background:rgba(68,138,255,.1); color:var(--blue); font-weight:700; letter-spacing:.5px; }

.task { display:grid; grid-template-columns:62px 1fr auto; gap:10px; align-items:start; padding:8px 8px; border-radius:2px; font-size:11px; transition:all .15s; }
.task:hover { background:rgba(255,255,255,.015); }
.task.done { opacity:0.45; }
.task.done .task-title { text-decoration:line-through; color:var(--muted); }

.task-sev { font-size:8px; font-weight:800; padding:3px 8px; border-radius:2px; text-align:center; text-transform:uppercase; letter-spacing:1px; }
.sev-critical { background:var(--red); color:#fff; box-shadow:var(--glow-red); }
.sev-high { background:var(--amber); color:#000; box-shadow:var(--glow-amber); }
.sev-medium { background:var(--surface-2); color:var(--muted); }
.sev-low { background:var(--surface); color:var(--dim); }

.task-title { color:var(--text); font-weight:500; }
.task-dest { display:inline-block; font-size:9px; font-weight:700; padding:1px 6px; border-radius:2px; background:rgba(68,138,255,.1); color:var(--blue); margin-right:4px; letter-spacing:.5px; text-transform:uppercase; }
.task-desc { font-size:10px; color:var(--muted); margin-top:2px; line-height:1.5; }
.task-file { font-family:var(--mono); font-size:10px; color:var(--blue); white-space:nowrap; align-self:center; }
.task-dim { font-size:8px; font-weight:700; padding:1px 5px; border-radius:2px; text-transform:uppercase; letter-spacing:.5px; background:var(--surface-2); color:var(--dim); margin-left:6px; }

.footer { font-size:9px; color:var(--dim); margin-top:24px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; letter-spacing:.5px; text-transform:uppercase; }

@media (max-width:640px) {
  .shell { padding:12px; }
  .stats-bar { gap:6px; }
  .stat-pill { padding:6px 12px; }
  .stat-pill-n { font-size:14px; }
  .task { grid-template-columns:54px 1fr; }
  .task-file { grid-column:2; font-size:9px; margin-top:-4px; }
}
</style>
</head>
<body>
<div class="shell">
<div class="nav">
  <a href="index.html">Architect</a>
  <a class="active" href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a href="portfolio-backlog.html">Portfolio</a>
</div>

<div class="hdr">
  <h1>Health</h1>
  <div class="hdr-st"><span class="pulse"></span><span id="clock">live</span></div>
</div>
<div class="sub">Scorecard + review findings</div>

<div class="stitle">Scorecard</div>
<div class="scorecard" id="scorecard"><table><tr><td colspan="6" style="color:var(--dim);text-align:center;padding:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase">Loading...</td></tr></table></div>

<div class="stitle">Findings</div>
<div class="stats-bar" id="stats"></div>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div class="footer"><span id="footer-info"></span><span>auto-refresh 30s</span></div>
</div>

<script>
const PROJ_COLORS = { SAMI:'var(--blue)', Hunter:'var(--green)', Vedic:'var(--pink)', Portfolio:'var(--red)', Cross:'var(--muted)' };
const SEV_ORDER = { critical:0, high:1, medium:2, low:3 };
const DIMS = ['Code','Tests','Security','UX','Infra'];

function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }

function categorize(title, desc) {
  const t = (title + ' ' + (desc || '')).toLowerCase();
  if (/test|coverage|assert|тест|покрыт|vitest|jest/.test(t)) return 'Tests';
  if (/auth|secur|xss|inject|token|key|secret|audit|cve|vulnerab/.test(t)) return 'Security';
  if (/ux|ui\b|pric|user|display|format|landing|дизайн|mobile|responsive|accessibility|a11y|font|color/.test(t)) return 'UX';
  if (/ci\b|deploy|config|env\b|deps?|infra|railway|vercel|goat|cron|launchd|backup|health|docker|uptime/.test(t)) return 'Infra';
  return 'Code';
}

function parseBacklog(md) {
  const lines = md.split('\n'), tasks = [];
  let review = '', severity = '';
  const PROJ_ALIAS = { VT:'Vedic', VEDIC:'Vedic', SAMI:'SAMI', HUNTER:'Hunter', PORTFOLIO:'Portfolio' };
  const SEV_ALIAS = { CRITICAL:'critical', HIGH:'high', MED:'medium', MEDIUM:'medium', LOW:'low' };
  for (const l of lines) {
    // Match: ## Review DATE or ## From Review DATE
    const rm = l.match(/^## (?:From )?Review (\d{4}-\d{2}-\d{2})/);
    if (rm) { review = rm[1]; severity = ''; continue; }
    const sm = l.match(/^### (Critical|High|Medium|Low)/i);
    if (sm) { severity = sm[1].toLowerCase(); continue; }
    // Reset severity on other headings
    if (/^###? /.test(l) && !sm) { severity = ''; continue; }
    if (!/^- \[[ x]\]/.test(l)) continue;
    const isDone = l.includes('[x]');
    let raw = l.replace(/^- \[[ x]\]\s*/, '').replace(/\*\*/g, '');
    let project = 'Other', dest = '', clean = raw, taskSev = severity;

    // Format 1: [Project → Dest] Title — desc (arrow inside brackets)
    const pm = raw.match(/^\[([^\]]+?)\s*→\s*([^\]]+)\]\s*/);
    // Format 1b: [Project] Title (no arrow, single bracket)
    const pm1b = !pm ? raw.match(/^\[([^\]]+)\]\s*/) : null;
    // Format 2: [VT][BUG][CRITICAL] Title — multiple bracket tags (no arrows)
    const tagM = raw.match(/^(\[[^\]→]+\]){2,}\s*/);
    // Format 3: **Project** — severity — title (from "From Review" sections)
    const flatM = raw.match(/^(\w+)\s*\u2014\s*(critical|high|medium|low)\s*\u2014\s*/i);

    if (pm) {
      project = PROJ_ALIAS[pm[1].trim().toUpperCase()] || pm[1].trim();
      dest = pm[2].trim();
      clean = raw.substring(pm[0].length);
    } else if (pm1b && !tagM) {
      project = PROJ_ALIAS[pm1b[1].trim().toUpperCase()] || pm1b[1].trim();
      clean = raw.substring(pm1b[0].length);
    } else if (tagM) {
      const tags = raw.match(/\[([^\]]+)\]/g).map(t => t.slice(1, -1));
      for (const t of tags) {
        if (PROJ_ALIAS[t.toUpperCase()]) project = PROJ_ALIAS[t.toUpperCase()];
        if (SEV_ALIAS[t.toUpperCase()]) taskSev = SEV_ALIAS[t.toUpperCase()];
      }
      clean = raw.substring(tagM[0].length);
    } else if (flatM) {
      project = PROJ_ALIAS[flatM[1].toUpperCase()] || flatM[1];
      taskSev = flatM[2].toLowerCase();
      clean = raw.substring(flatM[0].length);
    }

    // Also strip "Mega Review:" prefix
    clean = clean.replace(/^Mega Review:\s*/i, '');

    const fm = clean.match(/`([^`]+)`/g);
    const file = fm ? fm[fm.length - 1].replace(/`/g, '') : '';
    const parts = clean.split(' \u2014 ');
    const title = (parts[0] || clean).trim();
    let desc = parts.length > 1 ? parts.slice(1).join(' \u2014 ').replace(/`[^`]+`/g, '').trim() : '';
    if (desc.endsWith(' \u2014')) desc = desc.slice(0, -2).trim();
    const dim = categorize(title, desc);
    tasks.push({ review, severity: taskSev || 'medium', isDone, project, dest, title, desc, file, dim });
  }
  return tasks;
}

function buildScorecard(tasks) {
  const projects = ['SAMI', 'Hunter', 'Vedic', 'Portfolio'];
  const matrix = {};
  for (const p of projects) { matrix[p] = {}; for (const d of DIMS) matrix[p][d] = null; }

  const open = tasks.filter(t => !t.isDone);
  for (const t of open) {
    if (!matrix[t.project]) continue;
    const current = matrix[t.project][t.dim];
    const rank = SEV_ORDER[t.severity] ?? 3;
    if (current === null || rank < (SEV_ORDER[current] ?? 3)) {
      matrix[t.project][t.dim] = t.severity;
    }
  }
  return matrix;
}

function renderScorecard(matrix) {
  const projects = ['SAMI', 'Hunter', 'Vedic', 'Portfolio'];
  let html = '<table><tr><th></th>';
  DIMS.forEach(d => html += `<th>${d}</th>`);
  html += '</tr>';
  projects.forEach(p => {
    const color = PROJ_COLORS[p] || 'var(--muted)';
    html += `<tr><td style="color:${color}">${p}</td>`;
    DIMS.forEach(d => {
      const worst = matrix[p][d];
      let dot = 'gray';
      if (worst === 'critical') dot = 'red';
      else if (worst === 'high') dot = 'amber';
      else if (worst === 'medium' || worst === 'low') dot = 'green';
      html += `<td><span class="sc-dot ${dot}"></span></td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('scorecard').innerHTML = html;
}

function renderTasks(items) {
  const byReview = {};
  items.forEach(t => { (byReview[t.review] ||= []).push(t); });
  let html = '';
  for (const rev of Object.keys(byReview).sort().reverse()) {
    const group = byReview[rev].sort((a, b) => (SEV_ORDER[a.severity] ?? 3) - (SEV_ORDER[b.severity] ?? 3));
    html += `<div class="review-date">${rev}<span class="review-date-count">${group.length}</span></div>`;
    for (const t of group) {
      const dc = t.isDone ? ' done' : '';
      html += `<div class="task${dc}">
        <div class="task-sev sev-${t.severity}">${t.severity}</div>
        <div>
          <div class="task-title">${t.dest ? `<span class="task-dest">${esc(t.dest)}</span>` : ''}${esc(t.title)}<span class="task-dim">${t.dim}</span></div>
          ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
        </div>
        ${t.file ? `<div class="task-file">${esc(t.file)}</div>` : ''}
      </div>`;
    }
  }
  return html || '<p style="color:var(--green);padding:20px 0;font-size:10px;letter-spacing:1px;text-transform:uppercase">All clear</p>';
}

function render(md) {
  const tasks = parseBacklog(md);
  const open = tasks.filter(t => !t.isDone), done = tasks.filter(t => t.isDone);
  const crit = open.filter(t => t.severity === 'critical').length;
  const high = open.filter(t => t.severity === 'high').length;
  const med = open.filter(t => t.severity === 'medium' || t.severity === 'low').length;

  // Scorecard
  const matrix = buildScorecard(tasks);
  renderScorecard(matrix);

  // Stats
  document.getElementById('stats').innerHTML = [
    { n: crit, l: 'Critical', c: 'red' }, { n: high, l: 'High', c: 'amber' },
    { n: med, l: 'Medium', c: 'gray' }, { n: done.length, l: 'Done', c: 'green' },
  ].map(s => `<div class="stat-pill ${s.c}"><span class="stat-pill-n">${s.n}</span><span class="stat-pill-l">${s.l}</span></div>`).join('');

  // Group open by project
  const byProj = {};
  open.forEach(t => { (byProj[t.project] ||= []).push(t); });
  const projOrder = Object.keys(byProj).sort((a, b) => {
    const aMin = Math.min(...byProj[a].map(t => SEV_ORDER[t.severity] ?? 3));
    const bMin = Math.min(...byProj[b].map(t => SEV_ORDER[t.severity] ?? 3));
    return aMin - bMin;
  });

  let tabsH = '', panelsH = '';
  projOrder.forEach((p, i) => {
    const active = i === 0 ? ' active' : '';
    const color = PROJ_COLORS[p] || 'var(--muted)';
    tabsH += `<div class="tab${active}" style="border-bottom-color:${i === 0 ? color : 'transparent'}" data-color="${color}" onclick="switchTab(this,'p-${p}')">${p}<span class="badge">${byProj[p].length}</span></div>`;
    panelsH += `<div class="panel${active}" id="p-${p}">${renderTasks(byProj[p])}</div>`;
  });

  const doneActive = projOrder.length === 0 ? ' active' : '';
  tabsH += `<div class="tab${doneActive}" style="border-bottom-color:${projOrder.length === 0 ? 'var(--green)' : 'transparent'}" data-color="var(--green)" onclick="switchTab(this,'p-done')">Done<span class="badge">${done.length}</span></div>`;
  panelsH += `<div class="panel${doneActive}" id="p-done">${renderTasks(done, true)}</div>`;

  document.getElementById('tabs').innerHTML = tabsH;
  document.getElementById('panels').innerHTML = panelsH;
}

function switchTab(el, id) {
  document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.style.borderBottomColor = 'transparent'; });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  el.style.borderBottomColor = el.dataset.color || 'var(--text)';
  document.getElementById(id).classList.add('active');
}

function load() {
  fetch('mega-review-BACKLOG.md?' + Date.now()).then(r => r.text()).then(render).catch(() => {
    document.getElementById('panels').innerHTML = '<p style="color:var(--red);padding:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase">Failed to load mega-review-BACKLOG.md</p>';
  });
  fetch('mega-review-latest.md?' + Date.now()).then(r => r.ok ? r.text() : null).then(md => {
    if (md) {
      const h = md.split('\n').find(l => l.startsWith('# ')) || '';
      document.getElementById('footer-info').textContent = 'Latest: ' + h.replace('# ', '');
    }
  }).catch(() => {});
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
