<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMI Backlog</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --p0: #f85149;
    --p1: #d29922;
    --p2: #3fb950;
    --p3: #8b949e;
    --done: #238636;
    --done-bg: rgba(35,134,54,0.15);
    --deployed: #a371f7;
    --deployed-bg: rgba(163,113,247,0.15);
    --pending: #d29922;
    --pending-bg: rgba(210,153,34,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
    line-height: 1.5;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .meta {
    font-size: 13px;
    color: var(--text-muted);
  }

  .meta .live {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--p2);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .sprint {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .sprint-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .sprint-header:hover {
    background: rgba(255,255,255,0.03);
  }

  .sprint-title {
    font-size: 16px;
    font-weight: 600;
  }

  .sprint-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-active { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-planned { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .badge-done { background: var(--done-bg); color: var(--done); }
  .badge-deployed { background: var(--deployed-bg); color: var(--deployed); }

  .sprint-body {
    padding: 0 20px 16px;
  }

  .group {
    margin-bottom: 16px;
  }

  .group:last-child {
    margin-bottom: 0;
  }

  .group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 2px;
    font-size: 14px;
    transition: background 0.15s;
  }

  .task:hover {
    background: rgba(255,255,255,0.03);
  }

  .task.has-detail {
    cursor: pointer;
  }

  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-done .task-check {
    background: var(--done);
    border-color: var(--done);
  }

  .task-done .task-check::after {
    content: '\2713';
    color: white;
    font-size: 12px;
    font-weight: 700;
  }

  .task-done .task-text {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: rgba(139,148,158,0.4);
  }

  .task-content {
    flex: 1;
    min-width: 0;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .task-text {
    flex: 1;
  }

  .task-text strong {
    font-weight: 600;
  }

  .deploy-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .deploy-deployed {
    background: var(--deployed-bg);
    color: var(--deployed);
  }

  .deploy-pending {
    background: var(--pending-bg);
    color: var(--pending);
  }

  .task-detail {
    display: none;
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border-left: 2px solid var(--border);
    border-radius: 0 4px 4px 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .task-detail.open {
    display: block;
  }

  .expand-icon {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .task.expanded .expand-icon {
    transform: rotate(90deg);
  }

  .release {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;

  .release-header {

    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

    background: rgba(255,255,255,0.03);

    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;

  .release-date {

    font-weight: 400;

    align-items: flex-start;
    gap: 10px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--text-muted);
  }

    content: '\2713';
    color: var(--done);
    font-weight: 700;
    font-size: 12px;
    margin-top: 2px;
    flex-shrink: 0;
  }

    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 24px;

    font-weight: 600;
    margin-bottom: 12px;

  .service-cost.paid {

    margin-top: 4px;

const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/diyoriko/sami/main/COMMUNITY_TASKS.md';

// --- Markdown parser ---

function parseMarkdown(md) {
  const lines = md.split('\n');
  const releases = [];
  const sprints = [];

  let section = null;
  let currentSprint = null;
  let currentGroup = null;
  let currentTask = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (/^## Сделано/.test(line)) {
      section = 'done';
      continue;
    }

    const sprintMatch = line.match(/^## SPRINT \d+ — (.+?)(?:\s*\(v([\d.]+)\))?$/);
    if (sprintMatch) {
      section = 'sprint';
      let status = 'planned';
      for (let j = i + 1; j < Math.min(i + 4, lines.length); j++) {
        const sm = lines[j].match(/Статус:\s*\*\*(.+?)\*\*/);
        if (sm) {
          const raw = sm[1].toLowerCase();
          if (raw.includes('завершён') || raw.includes('completed')) status = 'completed';
          else if (raw.includes('деплой') || raw.includes('работ') || raw.includes('active')) status = 'active';
          break;
        }
      }
      currentSprint = { name: sprintMatch[1].trim(), status, groups: [] };
      sprints.push(currentSprint);
      currentGroup = null;
      currentTask = null;
      continue;
    }

    if (/^---\s*$/.test(line)) {
      section = null;
      currentSprint = null;
      currentGroup = null;
      currentTask = null;
      continue;
    }

    const groupMatch = line.match(/^### (P\d):\s*(.+)/i);
    if (groupMatch && currentSprint) {
      currentGroup = {
        title: groupMatch[2].trim(),
        priority: groupMatch[1].toLowerCase(),
        tasks: [],
      };
      currentSprint.groups.push(currentGroup);
      currentTask = null;
      continue;
    }

    // Version header in "Сделано": **v0.2.1 (10.03):**
    if (section === 'done') {
      const versionMatch = line.match(/^\*\*(v[\d.]+)\s*\(([^)]+)\):\*\*/);
      if (versionMatch) {
        releases.push({ version: versionMatch[1], date: versionMatch[2], status: 'deployed', items: [] });
        continue;
      }
    }

    const taskMatch = line.match(/^- \[([ x])\]\s+(.+)/);
    if (taskMatch) {
      const done = taskMatch[1] === 'x';
      let text = taskMatch[2].trim();
      let detail = '';
      const boldMatch = text.match(/^\*\*(.+?)\*\*\s*(.*)/);
      if (boldMatch) {
        text = boldMatch[1].replace(/\.+$/, '');
        detail = boldMatch[2] || '';
      }

      if (section === 'done') {
        if (releases.length) releases[releases.length - 1].items.push(text);
      } else if (currentGroup) {
        currentTask = { text, done };
        if (detail) currentTask.detail = detail;
        currentGroup.tasks.push(currentTask);
      }
      continue;
    }

    if (currentTask && section === 'sprint' && /^\s{2,}/.test(line) && line.trim()) {
      currentTask.detail = (currentTask.detail || '') + (currentTask.detail ? ' ' : '') + line.trim();
    }
  }

  return { releases, sprints };
}

async function fetchBacklog() {
  try {
    const res = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    const parsed = parseMarkdown(md);
    localStorage.setItem('sami_backlog_md', JSON.stringify(parsed));
    localStorage.setItem('sami_backlog_ts', Date.now().toString());
    return parsed;
  } catch (err) {
    console.warn('[backlog] fetch failed, trying cache:', err);
    const cached = localStorage.getItem('sami_backlog_md');
    if (cached) return JSON.parse(cached);
    return null;
  }
}

// Merged data — populated on load
let data = null;

async function initData() {
  // Local file:// — use staticData directly (no GitHub fetch needed)
  const isLocal = location.protocol === 'file:';
  const fetched = isLocal ? null : await fetchBacklog();
  if (fetched) {
    data = {
      releases: fetched.releases,
      sprints: fetched.sprints,
      agents: staticData.agents,
      flows: staticData.flows,
      services: staticData.services,
    };
  } else {
    data = staticData;
  }
  render();
}

function getPriorityColor(p) {
  const map = { p0: 'var(--p0)', p1: 'var(--p1)', p2: 'var(--p2)', p3: 'var(--p3)' };
  return map[p] || 'var(--text-muted)';
}

function toggleDetail(el) {
  const task = el.closest('.task');
  const detail = task.querySelector('.task-detail');
  if (!detail) return;
  task.classList.toggle('expanded');
  detail.classList.toggle('open');
}

function render() {
  // Counts
  const totalDeployed = data.releases.reduce((s, r) => s + r.items.length, 0);
  const totalOpen = data.sprints.reduce((s, sp) => s + sp.groups.reduce((g, gr) => g + gr.tasks.filter(t => !t.done).length, 0), 0);
  const p0Count = data.sprints.reduce((s, sp) => s + sp.groups.filter(g => g.priority === 'p0').reduce((g, gr) => g + gr.tasks.filter(t => !t.done).length, 0), 0);
  const pendingDeploy = data.sprints.reduce((s, sp) => s + sp.groups.reduce((g, gr) => g + gr.tasks.filter(t => t.deploy === 'pending').length, 0), 0);
  const sprintCount = data.sprints.length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value" style="color:var(--deployed)">${totalDeployed}</div><div class="stat-label">Задеплоено</div></div>
    <div class="stat"><div class="stat-value">${totalOpen}</div><div class="stat-label">Открыто</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--p0)">${p0Count}</div><div class="stat-label">P0</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--pending)">${pendingDeploy}</div><div class="stat-label">Ждут деплоя</div></div>
    <div class="stat"><div class="stat-value">${sprintCount}</div><div class="stat-label">Спринтов</div></div>
  `;

  // --- Agents Map ---
  let agentsHtml = '<div class="section-label">Агенты и связи</div>';
  agentsHtml += '<div class="agents-map">';
  agentsHtml += '<div class="agents-grid">';

  for (const agent of data.agents) {
    const statusClass = agent.status === 'active' ? 'status-active' : 'status-cron';
    agentsHtml += `
      <div class="agent-card" data-agent="${agent.id}">
        <div class="agent-header">
          <div class="agent-icon" style="background:${agent.color}22;color:${agent.color};border:1px solid ${agent.color}44">${agent.icon}</div>
          <div>
            <div class="agent-name">${agent.name}</div>
            <div class="agent-platform">${agent.platform}${agent.model ? ' &middot; ' + agent.model : ''}</div>
          </div>
        </div>
        <div class="agent-status ${statusClass}">
          <span class="agent-status-dot"></span>
          ${agent.statusLabel}
        </div>
        <div class="agent-skills">
          ${agent.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
        </div>
        <div class="agent-schedule">${agent.schedule}</div>
      </div>
    `;
  }

  agentsHtml += '</div>'; // agents-grid

  // Data flows
  agentsHtml += '<div class="data-flows">';
  agentsHtml += '<div class="data-flows-title">Потоки данных</div>';

  for (const flow of data.flows) {
    const typeClass = 'flow-' + flow.type;
    const typeLabel = { http: 'HTTP', file: 'File', telegram: 'TG', cron: 'Cron' }[flow.type] || flow.type;
    agentsHtml += `
      <div class="flow-row">
        <span class="flow-from">${flow.from}</span>
        <span class="flow-arrow">&#9654;</span>
        <span class="flow-to">${flow.to}</span>
        <span class="flow-label">${flow.label}</span>
        <span class="flow-type ${typeClass}">${flow.protocol}</span>
      </div>
    `;
  }

  agentsHtml += '</div>'; // data-flows

  // Legend
  agentsHtml += `
    <div class="connection-legend">
      <div class="legend-item"><span class="legend-line" style="background:var(--accent)"></span> HTTP</div>
      <div class="legend-item"><span class="legend-line" style="background:var(--p2)"></span> File/DB</div>
      <div class="legend-item"><span class="legend-line" style="background:var(--deployed)"></span> Telegram</div>
    </div>
  `;

  agentsHtml += '</div>'; // agents-map
  document.getElementById('agents').innerHTML = agentsHtml;

  let html = '';

  // --- Releases ---
  html += '<div class="section-label">Релизы</div>';

  for (const release of data.releases) {
    const statusBadge = release.status === 'deployed'
      ? '<span class="sprint-badge badge-deployed">Задеплоен</span>'
      : '<span class="sprint-badge badge-active">В работе</span>';

    html += `
      <div class="release collapsed" onclick="this.classList.toggle('collapsed')">
        <div class="release-header">
          <div class="release-title">
            ${release.version}
            <span class="release-date">${release.date}</span>
            ${statusBadge}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;color:var(--text-muted)">${release.items.length} задач</span>
            <span class="collapse-icon">&#9660;</span>
          </div>
        </div>
        <div class="release-body">
          ${release.items.map(item => `
            <div class="release-item">${item}</div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // --- Sprints ---
  html += '<div class="section-label">Спринты</div>';

  for (const sprint of data.sprints) {
    const badgeClass = sprint.status === 'completed' ? 'badge-deployed' : sprint.status === 'active' ? 'badge-active' : 'badge-planned';
    const badgeText = sprint.status === 'completed' ? 'Завершён' : sprint.status === 'active' ? 'В работе' : 'Планируется';
    const total = sprint.groups.reduce((s, g) => s + g.tasks.length, 0);
    const done = sprint.groups.reduce((s, g) => s + g.tasks.filter(t => t.done).length, 0);
    const pct = total > 0 ? Math.round(done / total * 100) : 0;

    html += `
      <div class="sprint">
        <div class="sprint-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <div>
            <span class="sprint-title">${sprint.name}</span>
            <div class="progress-bar" style="width:200px;margin-top:6px">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;color:var(--text-muted)">${done}/${total}</span>
            <span class="sprint-badge ${badgeClass}">${badgeText}</span>
            <span class="collapse-icon">&#9660;</span>
          </div>
        </div>
        <div class="sprint-body">
          ${sprint.groups.map(g => `
            <div class="group">
              <div class="group-title">
                <span class="priority-dot" style="background:${getPriorityColor(g.priority)}"></span>
                ${g.priority.toUpperCase()}: ${g.title}
              </div>
              ${g.tasks.map(t => {
                const hasDetail = !!t.detail;
                const deployTag = t.deploy === 'pending'
                  ? '<span class="deploy-tag deploy-pending">ждёт деплоя</span>'
                  : t.deploy === 'deployed'
                  ? '<span class="deploy-tag deploy-deployed">задеплоено</span>'
                  : '';
                const expandIcon = hasDetail ? '<span class="expand-icon">&#9654;</span>' : '';

                return `
                  <div class="task ${t.done ? 'task-done' : ''} ${hasDetail ? 'has-detail' : ''}" ${hasDetail ? 'onclick="toggleDetail(event.target)"' : ''}>
                    <div class="task-check"></div>
                    <div class="task-content">
                      <div class="task-row">
                        ${expandIcon}
                        <span class="task-text">${t.text}</span>
                        ${deployTag}
                      </div>
                      ${hasDetail ? `<div class="task-detail">${t.detail}</div>` : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = html;

  // Services
  document.getElementById('services').innerHTML = `
    <h3>Платные сервисы</h3>
    ${data.services.map(s => `
      <div class="service-row">
        <span class="service-name">${s.name}</span>
        <span>${s.desc}</span>
        <span class="service-cost ${s.paid ? 'paid' : ''}">${s.cost}</span>
      </div>
    `).join('')}
  `;

  const ts = localStorage.getItem('sami_backlog_ts');
  const src = ts ? 'GitHub' : 'static';
  const time = new Date().toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('lastUpdate').textContent = `${time} (${src})`;
}

initData();
</script>
