<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMI -- Backlog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #080b12; --surface: #0d1117; --surface-2: #131920; --border: #1b2332;
  --text: #e2e8f0; --text-2: #8b949e; --muted: #545d68; --dim: #363f4a;
  --green: #00e676; --red: #ff1744; --amber: #ffab00; --blue: #448aff;
  --purple: #b388ff; --pink: #ff80ab; --cyan: #18ffff;
  --mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
  --sans: 'JetBrains Mono','SF Mono',monospace;
  --glow-green: 0 0 8px rgba(0,230,118,.15);
  --glow-red: 0 0 8px rgba(255,23,68,.15);
  --glow-amber: 0 0 8px rgba(255,171,0,.15);
  --glow-blue: 0 0 8px rgba(68,138,255,.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text-2); padding: 0; min-height: 100vh; position: relative; overflow-x: hidden; line-height: 1.5; }
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(circle at 20% 30%, rgba(0,230,118,.03), transparent 60%),
  radial-gradient(circle at 80% 70%, rgba(68,138,255,.03), transparent 60%);
  pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,230,118,.15),transparent); animation:scanMove 4s ease-in-out infinite; pointer-events:none; z-index:999; }
@keyframes scanMove { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0} }
.shell { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:16px 20px 40px; }

a { color: var(--blue); text-decoration: none; } a:hover { text-decoration: underline; }

/* Nav */
.nav { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0; overflow-x:auto; margin-bottom:0; }
.nav a { font-size:10px; font-weight:600; padding:10px 16px; color:var(--muted); text-decoration:none; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:1.5px; text-transform:uppercase; transition:all .15s; white-space:nowrap; }
.nav a:hover { color:var(--text-2); text-decoration:none; }
.nav a.active { color:var(--text); border-bottom-color:var(--blue); }

/* Header */
.header { margin-top:20px; margin-bottom:20px; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.header h1 { font-size:14px; font-weight:800; color:var(--blue); letter-spacing:3px; text-transform:uppercase; }
.desc-text { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.3px; }
.header-links { display:flex; gap:10px; margin-top:10px; font-size:10px; }
.header-links a { color:var(--muted); text-decoration:none; padding:3px 10px; border-radius:2px; background:rgba(13,17,23,.82); backdrop-filter:blur(12px); border:1px solid var(--border); transition:all .15s; letter-spacing:.5px; text-transform:uppercase; font-weight:600; }
.header-links a:hover { color:var(--text); border-color:var(--dim); background:var(--surface-2); box-shadow:var(--glow-blue); text-decoration:none; }
.header .meta { font-size:10px; color:var(--dim); text-align:right; letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
.live-dot { display:inline-block; width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.desc { font-size:11px; color:var(--text-2); line-height:1.6; margin-bottom:20px; padding:10px 14px; background:rgba(13,17,23,.82); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:2px; }
.desc strong { color:var(--text); }

/* Section label */
.slabel, .lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--dim); margin:24px 0 10px; display:flex; align-items:center; gap:8px; }
.slabel::after, .lbl::after { content:''; flex:1; height:1px; background:var(--border); }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:24px; }
.stat { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:14px 10px; text-align:center; transition:all .2s; }
.stat:hover { background:rgba(19,25,32,.95); }
.stat-val { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
.stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:2px; margin-top:2px; font-weight:600; }

/* Sections */
.section { background:rgba(13,17,23,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:2px; margin-bottom:2px; overflow:hidden; transition:box-shadow .2s; }
.section:hover { box-shadow:var(--glow-blue); }
.section-hdr { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; }
.section-hdr:hover { background:rgba(255,255,255,.015); }
.section-title { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.badge { font-size:8px; padding:2px 8px; border-radius:2px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-left:8px; }
.badge-active { background:rgba(68,138,255,.12); color:var(--blue); }
.badge-done { background:rgba(0,230,118,.1); color:var(--green); }
.badge-muted { background:rgba(54,63,74,.3); color:var(--dim); }
.caret { transition:transform .2s; color:var(--dim); font-size:8px; }
.collapsed .caret { transform:rotate(-90deg); }
.collapsed .section-body { display:none; }
.section-body { padding:0 16px 14px; }
.progress-bar { height:2px; background:var(--border); overflow:hidden; margin:0 16px; }
.progress-fill { height:100%; background:var(--blue); transition:width .3s; }

/* Groups */
.group { margin-bottom:12px; } .group:last-child { margin-bottom:0; }
.group-title { font-size:9px; font-weight:700; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:7px; text-transform:uppercase; letter-spacing:1.5px; }
.group-title.cancelled { text-decoration:line-through; color:var(--dim); }
.pdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* Tasks */
.task { display:flex; align-items:flex-start; gap:9px; padding:5px 10px; border-radius:2px; font-size:11px; transition:all .15s; }
.task:hover { background:rgba(255,255,255,.02); }
.task-chk { width:14px; height:14px; border-radius:2px; border:2px solid var(--border); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; }
.task-done .task-chk { background:var(--green); border-color:var(--green); }
.task-done .task-chk::after { content:'\2713'; color:#000; font-size:9px; font-weight:700; }
.task-done .task-txt { color:var(--dim); text-decoration:line-through; text-decoration-color:rgba(54,63,74,.6); }
.task-cnt { flex:1; min-width:0; }
.task-txt { flex:1; } .task-txt strong { font-weight:600; }
.task-row { display:flex; align-items:center; gap:6px; }
.task-detail { display:none; margin-top:4px; padding:6px 10px; background:var(--surface-2); border-left:2px solid var(--border); border-radius:0 2px 2px 0; font-size:10px; color:var(--muted); line-height:1.5; }
.task-detail.open { display:block; }
.task.has-detail { cursor:pointer; }
.exp-icon { font-size:8px; color:var(--dim); transition:transform .15s; flex-shrink:0; }
.task.expanded .exp-icon { transform:rotate(90deg); }
.release-item { display:flex; align-items:flex-start; gap:8px; padding:4px 10px; font-size:10px; color:var(--muted); }
.release-item::before { content:'\2713'; color:var(--green); font-weight:700; font-size:10px; margin-top:1px; flex-shrink:0; }

/* Moderation UI */
.task.moderable { border-left:2px solid var(--blue); padding-left:12px; position:relative; }
.task.moderable[data-source="strategist"] { border-left-color:var(--blue); }
.task.moderable[data-source="mega-review"] { border-left-color:var(--red); }
.task.moderable[data-source="coderabbit"] { border-left-color:var(--purple); }
.source-badge { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:1px 6px; border-radius:2px; margin-left:6px; white-space:nowrap; vertical-align:middle; }
.source-badge.strategist { background:rgba(68,138,255,.12); color:var(--blue); }
.source-badge.mega-review { background:rgba(255,23,68,.1); color:var(--red); }
.source-badge.coderabbit { background:rgba(179,136,255,.12); color:var(--purple); }
.mod-actions { display:inline-flex; gap:4px; margin-left:8px; flex-shrink:0; }
.mod-btn { font-size:10px; padding:1px 8px; border-radius:2px; border:1px solid var(--border); background:transparent; cursor:pointer; font-family:var(--sans); transition:all .15s; white-space:nowrap; }
.mod-btn:hover { background:var(--surface-2); }
.mod-btn.keep { color:var(--green); border-color:rgba(0,230,118,.2); }
.mod-btn.keep:hover { background:rgba(0,230,118,.1); box-shadow:var(--glow-green); }
.mod-btn.remove { color:var(--red); border-color:rgba(255,23,68,.2); }
.mod-btn.remove:hover { background:rgba(255,23,68,.08); box-shadow:var(--glow-red); }
.mod-btn:disabled { opacity:0.4; cursor:default; }
.task.mod-removing { animation:modFadeOut .3s ease forwards; }
.task.mod-kept .source-badge, .task.mod-kept .mod-actions { display:none; }
.task.mod-kept { border-left-color:var(--border); }
@keyframes modFadeOut { to { opacity:0; height:0; padding:0; margin:0; overflow:hidden; } }

@media (max-width:600px) { .stats { grid-template-columns:repeat(3,1fr); } .shell { padding:12px; } }
</style>
</head>
<body>
<div class="shell">
<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a class="active" href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a href="portfolio-backlog.html">Portfolio</a>
</div>
<div class="header">
  <div class="header-top">
    <h1>SAMI</h1>
    <div class="meta"><span class="live-dot"></span> <span id="ts">--</span></div>
  </div>
  <div class="desc-text">Telegram fitness community. YouTube видео, челленджи, UGC, автопостинг. grammY + SQLite + Railway.</div>
  <div class="header-links">
    <a href="https://t.me/sami_workouts" target="_blank">@sami_workouts</a>
    <a href="https://t.me/sami_workout_bot" target="_blank">@sami_workout_bot</a>
    <a href="https://courageous-happiness-production.up.railway.app/health" target="_blank">Railway</a>
  </div>
</div>
<div class="stats" id="stats"></div>
<div id="content"></div>
</div>
<script>
const SRC = 'sami-BACKLOG.md?' + Date.now();
const REFRESH = 30000;

function parse(md) {
  const lines = md.split('\n');
  const sections = []; let cur = null, grp = null;
  for (const line of lines) {
    if (/^## Метаданные/.test(line)) { cur = null; continue; }
    const h2 = line.match(/^## (.+)/);
    if (h2) {
      cur = { title: h2[1].trim(), groups: [], tasks: [] };
      sections.push(cur); grp = null; continue;
    }
    if (!cur) continue;
    // ### group
    const h3 = line.match(/^### (.+)/);
    if (h3) {
      const raw = h3[1].trim();
      const cancelled = /~~.+~~/.test(raw);
      const clean = raw.replace(/~~/g, '');
      const pm = clean.match(/^(P\d)(?:[:-]?\d*)?[:\s]+(.+)/i);
      grp = { title: pm ? pm[2].trim() : clean, priority: pm ? pm[1].toLowerCase() : null, tasks: [], cancelled };
      cur.groups.push(grp); continue;
    }
    // **v0.x.x (date):** version headers inside "Сделано"
    const vm = line.match(/^\*\*(v[\d.]+)\s*\(([^)]+)\):\*\*/);
    if (vm) {
      grp = { title: vm[1] + ' (' + vm[2] + ')', priority: null, tasks: [], version: true };
      cur.groups.push(grp); continue;
    }
    // Task
    const tm = line.match(/^- \[([ x])\]\s+(.+)/);
    if (tm) {
      const done = tm[1] === 'x';
      let text = tm[2].trim(), detail = '';
      const bm = text.match(/^\*\*(.+?)\*\*\s*(?:[—\-]\s*(.*))?/);
      if (bm) { text = bm[1]; detail = bm[2] || ''; }
      const t = { text, done };
      if (detail) t.detail = detail;
      if (grp) grp.tasks.push(t); else cur.tasks.push(t);
      continue;
    }
  }
  return sections;
}

function count(sections) {
  let open = 0, done = 0, p0 = 0;
  for (const s of sections) {
    for (const t of s.tasks) { if (t.done) done++; else open++; }
    for (const g of s.groups) {
      for (const t of g.tasks) {
        if (t.done) done++; else { open++; if (g.priority === 'p0') p0++; }
      }
    }
  }
  const total = open + done;
  const pct = total ? Math.round(done / total * 100) : 0;
  return { open, done, p0, total, pct };
}

function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
function pcolor(p) { return { p0: 'var(--red)', p1: 'var(--amber)', p2: 'var(--green)', p3: 'var(--dim)' }[p] || 'var(--muted)'; }

function renderStats(c) {
  const items = [
    { v: c.total, l: 'Total', c: 'var(--text)' },
    { v: c.open, l: 'Open', c: 'var(--blue)' },
    { v: c.done, l: 'Done', c: 'var(--green)' },
    { v: c.p0, l: 'P0', c: 'var(--red)' },
    { v: c.pct + '%', l: 'Progress', c: 'var(--purple)' },
  ];
  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`
  ).join('');
}

function isSprint(title) { return /^SPRINT\s+\d/i.test(title); }
function isDone(title) { return /^Сделано/i.test(title); }
function isCompleted(title) { return /Завершённые/i.test(title); }

function sectionBadge(sec) {
  const t = sec.title;
  if (isDone(t)) return '<span class="badge badge-done">released</span>';
  if (isCompleted(t)) return '<span class="badge badge-muted">archive</span>';
  // Sprint: check if all tasks done
  let total = 0, dn = 0;
  for (const g of sec.groups) { for (const tk of g.tasks) { total++; if (tk.done) dn++; } }
  for (const tk of sec.tasks) { total++; if (tk.done) dn++; }
  if (total > 0 && total === dn) return '<span class="badge badge-done">done</span>';
  if (dn > 0) return '<span class="badge badge-active">active</span>';
  return '<span class="badge badge-muted">planned</span>';
}

function sectionProgress(sec) {
  let total = 0, dn = 0;
  for (const g of sec.groups) { for (const tk of g.tasks) { total++; if (tk.done) dn++; } }
  for (const tk of sec.tasks) { total++; if (tk.done) dn++; }
  const pct = total ? Math.round(dn / total * 100) : 0;
  return { total, dn, pct };
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'sami';

function detectSource(text, detail) {
  const full = text + ' ' + (detail || '');
  for (const tag of SOURCE_TAGS) {
    if (full.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(t) {
  const source = t.done ? null : detectSource(t.text, t.detail);
  const dc = t.done ? 'task-done' : '';
  const hd = t.detail ? 'has-detail' : '';
  const modCls = source ? ' moderable' : '';
  const dataAttr = source ? ` data-source="${source}"` : '';
  const cl = t.detail ? 'onclick="td(this)"' : '';
  const cleanText = source ? stripSourceTag(t.text, source) : t.text;
  const cleanDetail = source && t.detail ? stripSourceTag(t.detail, source) : (t.detail || '');
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = (t.text + (t.detail ? ' — ' + t.detail : '')).replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';
  return `<div class="task ${dc} ${hd}${modCls}" ${cl}${dataAttr}>
    <div class="task-chk"></div>
    <div class="task-cnt"><div class="task-row">
      <span class="task-txt"><strong>${esc(cleanText)}</strong></span>${badge}${actions}
      ${t.detail ? '<span class="exp-icon">&#x25B6;</span>' : ''}
    </div>${cleanDetail ? `<div class="task-detail">${esc(cleanDetail)}</div>` : ''}</div></div>`;
}

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

function renderGroup(g) {
  const dot = g.priority ? `<span class="pdot" style="background:${pcolor(g.priority)}"></span>` : '';
  const pLabel = g.priority ? g.priority.toUpperCase() + ': ' : '';
  const cls = g.cancelled ? ' cancelled' : '';
  return `<div class="group">
    <div class="group-title${cls}">${dot}${pLabel}${esc(g.title)}</div>
    ${g.tasks.map(renderTask).join('')}</div>`;
}

function renderSection(sec, idx) {
  const p = sectionProgress(sec);
  const collapsed = (isDone(sec.title) || isCompleted(sec.title) || (p.total > 0 && p.total === p.dn)) ? ' collapsed' : '';
  const counter = p.total ? `<span style="font-size:10px;color:var(--muted);letter-spacing:.5px">${p.dn}/${p.total}</span>` : '';
  const body = sec.groups.length
    ? sec.groups.map(renderGroup).join('')
    : sec.tasks.map(renderTask).join('');
  return `<div class="section${collapsed}">
    <div class="section-hdr" onclick="this.parentElement.classList.toggle('collapsed')">
      <div><span class="section-title">${esc(sec.title)}</span>${sectionBadge(sec)}</div>
      <div style="display:flex;align-items:center;gap:10px">${counter}<span class="caret">&#x25BC;</span></div>
    </div>
    ${p.total ? `<div class="progress-bar"><div class="progress-fill" style="width:${p.pct}%"></div></div>` : ''}
    <div class="section-body">${body}</div></div>`;
}

function td(el) {
  const t = el.closest('.task');
  if (!t) return;
  t.classList.toggle('expanded');
  const d = t.querySelector('.task-detail');
  if (d) d.classList.toggle('open');
}

async function load() {
  try {
    const r = await fetch(SRC);
    if (!r.ok) throw new Error(r.status);
    const md = await r.text();
    const secs = parse(md);
    const c = count(secs);
    renderStats(c);
    const label = '<div class="lbl">Sprints</div>';
    const doneLabel = '<div class="lbl">Releases</div>';
    let sprintHtml = '', doneHtml = '', otherHtml = '';
    secs.forEach((s, i) => {
      const html = renderSection(s, i);
      if (isDone(s.title)) doneHtml += html;
      else if (isSprint(s.title) || isCompleted(s.title)) sprintHtml += html;
      else otherHtml += html;
    });
    let out = '';
    if (sprintHtml) out += label + sprintHtml;
    if (otherHtml) out += '<div class="lbl">Other</div>' + otherHtml;
    if (doneHtml) out += doneLabel + doneHtml;
    document.getElementById('content').innerHTML = out;
    const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('ts').textContent = now + ' (live)';
  } catch (e) {
    console.warn('[sami-backlog] fetch error:', e);
    document.getElementById('ts').textContent = 'offline';
  }
}

load();
setInterval(() => { load(); }, REFRESH);
</script>
</body>
</html>
