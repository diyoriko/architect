<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMI -- Backlog</title>
<style>
  :root {
    --bg: #0F172A; --surface: #1E293B; --surface-2: #273549; --border: #334155;
    --text: #F8FAFC; --text-2: #CBD5E1; --muted: #94A3B8; --dim: #64748B;
    --green: #22C55E; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #A78BFA; --pink: #F472B6;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 24px; max-width: 960px; margin: 0 auto; line-height: 1.5; }
  a { color: var(--blue); text-decoration: none; } a:hover { text-decoration: underline; }
  .header { margin-bottom: 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--blue); letter-spacing: -0.5px; }
  .desc-text { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .header-links { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; }
  .header-links a { color: var(--muted); text-decoration: none; padding: 2px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); transition: all 0.15s; }
  .header-links a:hover { color: var(--text); border-color: var(--dim); background: var(--surface-2); }
  .nav { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; }
  .nav a { font-size: 13px; padding: 8px 14px; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
  .nav a:hover { color: var(--text-2); }
  .nav a.active { color: var(--text); border-bottom-color: var(--blue); }
  .header .meta { font-size: 12px; color: var(--muted); text-align: right; }
  .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .desc { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 20px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .desc strong { color: var(--text); }
  .links { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .section-hdr { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .section-hdr:hover { background: rgba(255,255,255,.03); }
  .section-title { font-size: 15px; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-left: 8px; }
  .badge-active { background: rgba(59,130,246,.15); color: var(--blue); }
  .badge-done { background: rgba(34,197,94,.12); color: var(--green); }
  .badge-muted { background: rgba(148,163,184,.12); color: var(--muted); }
  .caret { transition: transform .2s; color: var(--dim); font-size: 12px; }
  .collapsed .caret { transform: rotate(-90deg); }
  .collapsed .section-body { display: none; }
  .section-body { padding: 0 18px 14px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 0 18px; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
  .group { margin-bottom: 14px; } .group:last-child { margin-bottom: 0; }
  .group-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
  .group-title.cancelled { text-decoration: line-through; color: var(--dim); }
  .pdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .task { display: flex; align-items: flex-start; gap: 9px; padding: 6px 10px; border-radius: 5px; font-size: 13px; transition: background .15s; }
  .task:hover { background: rgba(255,255,255,.03); }
  .task-chk { width: 16px; height: 16px; border-radius: 3px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .task-done .task-chk { background: var(--green); border-color: var(--green); }
  .task-done .task-chk::after { content: '\2713'; color: #fff; font-size: 10px; font-weight: 700; }
  .task-done .task-txt { color: var(--dim); text-decoration: line-through; text-decoration-color: rgba(100,116,139,.4); }
  .task-cnt { flex: 1; min-width: 0; }
  .task-txt { flex: 1; } .task-txt strong { font-weight: 600; }
  .task-row { display: flex; align-items: center; gap: 6px; }
  .task-detail { display: none; margin-top: 4px; padding: 6px 10px; background: var(--surface-2); border-left: 2px solid var(--border); border-radius: 0 4px 4px 0; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .task-detail.open { display: block; }
  .task.has-detail { cursor: pointer; }
  .exp-icon { font-size: 9px; color: var(--dim); transition: transform .15s; flex-shrink: 0; }
  .task.expanded .exp-icon { transform: rotate(90deg); }
  .release-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 10px; font-size: 12px; color: var(--muted); }
  .release-item::before { content: '\2713'; color: var(--green); font-weight: 700; font-size: 11px; margin-top: 1px; flex-shrink: 0; }
  .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 20px 0 10px; }
  /* Moderation UI */
  .task.moderable { border-left: 3px solid var(--blue); padding-left: 12px; position: relative; }
  .task.moderable[data-source="strategist"] { border-left-color: var(--blue); }
  .task.moderable[data-source="mega-review"] { border-left-color: var(--red); }
  .task.moderable[data-source="coderabbit"] { border-left-color: var(--purple); }
  .source-badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; vertical-align: middle; }
  .source-badge.strategist { background: rgba(59,130,246,0.15); color: var(--blue); }
  .source-badge.mega-review { background: rgba(239,68,68,0.12); color: var(--red); }
  .source-badge.coderabbit { background: rgba(167,139,250,0.15); color: var(--purple); }
  .mod-actions { display: inline-flex; gap: 4px; margin-left: 8px; flex-shrink: 0; }
  .mod-btn { font-size: 11px; padding: 1px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: var(--sans); transition: all 0.15s; white-space: nowrap; }
  .mod-btn:hover { background: var(--surface-2); }
  .mod-btn.keep { color: var(--green); border-color: rgba(34,197,94,0.3); }
  .mod-btn.keep:hover { background: rgba(34,197,94,0.12); }
  .mod-btn.remove { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .mod-btn.remove:hover { background: rgba(239,68,68,0.1); }
  .mod-btn:disabled { opacity: 0.4; cursor: default; }
  .task.mod-removing { animation: modFadeOut 0.3s ease forwards; }
  .task.mod-kept .source-badge, .task.mod-kept .mod-actions { display: none; }
  .task.mod-kept { border-left-color: var(--border); }
  @keyframes modFadeOut { to { opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; } }

  @media (max-width: 600px) { .stats { grid-template-columns: repeat(3, 1fr); } body { padding: 14px; } }
</style>
</head>
<body>
<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a class="active" href="sami-backlog.html">SAMI</a>
  <a href="vedic-backlog.html">Vedic</a>
  <a href="portfolio-backlog.html">Portfolio</a>
</div>
<div class="header">
  <div class="header-top">
    <h1>SAMI</h1>
    <div class="meta"><span class="live-dot"></span> <span id="ts">--</span></div>
  </div>
  <div class="desc-text">Telegram fitness community. YouTube видео, челленджи, UGC, автопостинг. grammY + SQLite + Railway.</div>
  <div class="header-links">
    <a href="https://t.me/sami_workouts" target="_blank">@sami_workouts</a>
    <a href="https://t.me/sami_workout_bot" target="_blank">@sami_workout_bot</a>
    <a href="https://courageous-happiness-production.up.railway.app/health" target="_blank">Railway</a>
  </div>
</div>
<div class="stats" id="stats"></div>
<div id="content"></div>
<script>
const SRC = 'sami-BACKLOG.md?' + Date.now();
const REFRESH = 30000;

function parse(md) {
  const lines = md.split('\n');
  const sections = []; let cur = null, grp = null;
  for (const line of lines) {
    if (/^## Метаданные/.test(line)) { cur = null; continue; }
    const h2 = line.match(/^## (.+)/);
    if (h2) {
      cur = { title: h2[1].trim(), groups: [], tasks: [] };
      sections.push(cur); grp = null; continue;
    }
    if (!cur) continue;
    // ### group
    const h3 = line.match(/^### (.+)/);
    if (h3) {
      const raw = h3[1].trim();
      const cancelled = /~~.+~~/.test(raw);
      const clean = raw.replace(/~~/g, '');
      const pm = clean.match(/^(P\d)(?:[:-]?\d*)?[:\s]+(.+)/i);
      grp = { title: pm ? pm[2].trim() : clean, priority: pm ? pm[1].toLowerCase() : null, tasks: [], cancelled };
      cur.groups.push(grp); continue;
    }
    // **v0.x.x (date):** version headers inside "Сделано"
    const vm = line.match(/^\*\*(v[\d.]+)\s*\(([^)]+)\):\*\*/);
    if (vm) {
      grp = { title: vm[1] + ' (' + vm[2] + ')', priority: null, tasks: [], version: true };
      cur.groups.push(grp); continue;
    }
    // Task
    const tm = line.match(/^- \[([ x])\]\s+(.+)/);
    if (tm) {
      const done = tm[1] === 'x';
      let text = tm[2].trim(), detail = '';
      const bm = text.match(/^\*\*(.+?)\*\*\s*(?:[—\-]\s*(.*))?/);
      if (bm) { text = bm[1]; detail = bm[2] || ''; }
      const t = { text, done };
      if (detail) t.detail = detail;
      if (grp) grp.tasks.push(t); else cur.tasks.push(t);
      continue;
    }
  }
  return sections;
}

function count(sections) {
  let open = 0, done = 0, p0 = 0;
  for (const s of sections) {
    for (const t of s.tasks) { if (t.done) done++; else open++; }
    for (const g of s.groups) {
      for (const t of g.tasks) {
        if (t.done) done++; else { open++; if (g.priority === 'p0') p0++; }
      }
    }
  }
  const total = open + done;
  const pct = total ? Math.round(done / total * 100) : 0;
  return { open, done, p0, total, pct };
}

function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
function pcolor(p) { return { p0: 'var(--red)', p1: 'var(--amber)', p2: 'var(--green)', p3: 'var(--dim)' }[p] || 'var(--muted)'; }

function renderStats(c) {
  const items = [
    { v: c.total, l: 'Total', c: 'var(--text)' },
    { v: c.open, l: 'Open', c: 'var(--blue)' },
    { v: c.done, l: 'Done', c: 'var(--green)' },
    { v: c.p0, l: 'P0', c: 'var(--red)' },
    { v: c.pct + '%', l: 'Progress', c: 'var(--purple)' },
  ];
  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`
  ).join('');
}

function isSprint(title) { return /^SPRINT\s+\d/i.test(title); }
function isDone(title) { return /^Сделано/i.test(title); }
function isCompleted(title) { return /Завершённые/i.test(title); }

function sectionBadge(sec) {
  const t = sec.title;
  if (isDone(t)) return '<span class="badge badge-done">released</span>';
  if (isCompleted(t)) return '<span class="badge badge-muted">archive</span>';
  // Sprint: check if all tasks done
  let total = 0, dn = 0;
  for (const g of sec.groups) { for (const tk of g.tasks) { total++; if (tk.done) dn++; } }
  for (const tk of sec.tasks) { total++; if (tk.done) dn++; }
  if (total > 0 && total === dn) return '<span class="badge badge-done">done</span>';
  if (dn > 0) return '<span class="badge badge-active">active</span>';
  return '<span class="badge badge-muted">planned</span>';
}

function sectionProgress(sec) {
  let total = 0, dn = 0;
  for (const g of sec.groups) { for (const tk of g.tasks) { total++; if (tk.done) dn++; } }
  for (const tk of sec.tasks) { total++; if (tk.done) dn++; }
  const pct = total ? Math.round(dn / total * 100) : 0;
  return { total, dn, pct };
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'sami';

function detectSource(text, detail) {
  const full = text + ' ' + (detail || '');
  for (const tag of SOURCE_TAGS) {
    if (full.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(t) {
  const source = t.done ? null : detectSource(t.text, t.detail);
  const dc = t.done ? 'task-done' : '';
  const hd = t.detail ? 'has-detail' : '';
  const modCls = source ? ' moderable' : '';
  const dataAttr = source ? ` data-source="${source}"` : '';
  const cl = t.detail ? 'onclick="td(this)"' : '';
  const cleanText = source ? stripSourceTag(t.text, source) : t.text;
  const cleanDetail = source && t.detail ? stripSourceTag(t.detail, source) : (t.detail || '');
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = (t.text + (t.detail ? ' — ' + t.detail : '')).replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';
  return `<div class="task ${dc} ${hd}${modCls}" ${cl}${dataAttr}>
    <div class="task-chk"></div>
    <div class="task-cnt"><div class="task-row">
      <span class="task-txt"><strong>${esc(cleanText)}</strong></span>${badge}${actions}
      ${t.detail ? '<span class="exp-icon">&#x25B6;</span>' : ''}
    </div>${cleanDetail ? `<div class="task-detail">${esc(cleanDetail)}</div>` : ''}</div></div>`;
}

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

function renderGroup(g) {
  const dot = g.priority ? `<span class="pdot" style="background:${pcolor(g.priority)}"></span>` : '';
  const pLabel = g.priority ? g.priority.toUpperCase() + ': ' : '';
  const cls = g.cancelled ? ' cancelled' : '';
  return `<div class="group">
    <div class="group-title${cls}">${dot}${pLabel}${esc(g.title)}</div>
    ${g.tasks.map(renderTask).join('')}</div>`;
}

function renderSection(sec, idx) {
  const p = sectionProgress(sec);
  const collapsed = (isDone(sec.title) || isCompleted(sec.title) || (p.total > 0 && p.total === p.dn)) ? ' collapsed' : '';
  const counter = p.total ? `<span style="font-size:12px;color:var(--muted)">${p.dn}/${p.total}</span>` : '';
  const body = sec.groups.length
    ? sec.groups.map(renderGroup).join('')
    : sec.tasks.map(renderTask).join('');
  return `<div class="section${collapsed}">
    <div class="section-hdr" onclick="this.parentElement.classList.toggle('collapsed')">
      <div><span class="section-title">${esc(sec.title)}</span>${sectionBadge(sec)}</div>
      <div style="display:flex;align-items:center;gap:10px">${counter}<span class="caret">&#x25BC;</span></div>
    </div>
    ${p.total ? `<div class="progress-bar"><div class="progress-fill" style="width:${p.pct}%"></div></div>` : ''}
    <div class="section-body">${body}</div></div>`;
}

function td(el) {
  const t = el.closest('.task');
  if (!t) return;
  t.classList.toggle('expanded');
  const d = t.querySelector('.task-detail');
  if (d) d.classList.toggle('open');
}

async function load() {
  try {
    const r = await fetch(SRC);
    if (!r.ok) throw new Error(r.status);
    const md = await r.text();
    const secs = parse(md);
    const c = count(secs);
    renderStats(c);
    const label = '<div class="lbl">Sprints</div>';
    const doneLabel = '<div class="lbl">Releases</div>';
    let sprintHtml = '', doneHtml = '', otherHtml = '';
    secs.forEach((s, i) => {
      const html = renderSection(s, i);
      if (isDone(s.title)) doneHtml += html;
      else if (isSprint(s.title) || isCompleted(s.title)) sprintHtml += html;
      else otherHtml += html;
    });
    let out = '';
    if (sprintHtml) out += label + sprintHtml;
    if (otherHtml) out += '<div class="lbl">Other</div>' + otherHtml;
    if (doneHtml) out += doneLabel + doneHtml;
    document.getElementById('content').innerHTML = out;
    const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('ts').textContent = now + ' (live)';
  } catch (e) {
    console.warn('[sami-backlog] fetch error:', e);
    document.getElementById('ts').textContent = 'offline';
  }
}

load();
setInterval(() => { load(); }, REFRESH);
</script>
</body>
</html>
