<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedic Turkiye — Backlog</title>
<style>
  :root {
    --bg: #0F172A; --surface: #1E293B; --surface-2: #273549; --border: #334155;
    --text: #F8FAFC; --text-2: #CBD5E1; --muted: #94A3B8; --dim: #64748B;
    --green: #22C55E; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #A78BFA; --pink: #F472B6;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
    --done: #22C55E; --done-bg: rgba(34,197,94,0.12);
    --blocker: #EF4444; --blocker-bg: rgba(239,68,68,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
    line-height: 1.5;
  }

  a { color: var(--pink); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header { margin-bottom: 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .nav { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; }
  .nav a { font-size: 13px; padding: 8px 14px; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
  .nav a:hover { color: var(--text-2); }
  .nav a.active { color: var(--text); border-bottom-color: var(--pink); }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--pink); }
  .desc-text { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .header-links { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; }
  .header-links a { color: var(--muted); text-decoration: none; padding: 2px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); transition: all 0.15s; }
  .header-links a:hover { color: var(--text); border-color: var(--dim); background: var(--surface-2); }
  .meta { font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 6px; }
  .meta .live { display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .section-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .section-header:hover { background: rgba(255,255,255,0.03); }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-active { background: rgba(244,114,182,0.15); color: var(--pink); }
  .badge-done { background: var(--done-bg); color: var(--done); }
  .badge-planned { background: rgba(148,163,184,0.15); color: var(--muted); }
  .badge-blocker { background: var(--blocker-bg); color: var(--blocker); }
  .section-body { padding: 0 20px 16px; }
  .collapse-icon { transition: transform 0.2s; color: var(--muted); }
  .collapsed .collapse-icon { transform: rotate(-90deg); }
  .collapsed .section-body { display: none; }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: var(--pink); border-radius: 2px; transition: width 0.3s; }

  .group { margin-bottom: 16px; }
  .group:last-child { margin-bottom: 0; }
  .group-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .group.blockers { border-left: 3px solid var(--amber); padding-left: 12px; margin-left: -12px; }
  .group.blockers .group-title { color: var(--amber); }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 6px; margin-bottom: 2px; font-size: 14px; transition: background 0.15s; }
  .task:hover { background: rgba(255,255,255,0.03); }
  .task.has-detail { cursor: pointer; }
  .task-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .task-done .task-check { background: var(--done); border-color: var(--done); }
  .task-done .task-check::after { content: '\2713'; color: white; font-size: 12px; font-weight: 700; }
  .task-done .task-text { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,0.4); }
  .task-content { flex: 1; min-width: 0; }
  .task-row { display: flex; align-items: center; gap: 8px; }
  .task-text { flex: 1; }
  .task-text strong { font-weight: 600; }
  .task-id { font-size: 11px; color: var(--dim); font-family: var(--mono); flex-shrink: 0; }
  .task-detail { display: none; margin-top: 6px; padding: 8px 12px; background: rgba(255,255,255,0.02); border-left: 2px solid var(--border); border-radius: 0 4px 4px 0; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .task-detail.open { display: block; }
  .expand-icon { font-size: 10px; color: var(--muted); transition: transform 0.15s; flex-shrink: 0; }
  .task.expanded .expand-icon { transform: rotate(90deg); }

  .done-section .section-body { max-height: 300px; overflow-y: auto; }
  .release-item { display: flex; align-items: flex-start; gap: 10px; padding: 5px 12px; font-size: 13px; color: var(--muted); }
  .release-item::before { content: '\2713'; color: var(--done); font-weight: 700; font-size: 12px; margin-top: 2px; flex-shrink: 0; }

  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 24px 0 12px; }

  .error-msg { color: var(--muted); padding: 40px 20px; text-align: center; font-size: 14px; }

  /* Moderation UI */
  .task.moderable { border-left: 3px solid var(--blue); padding-left: 12px; position: relative; }
  .task.moderable[data-source="strategist"] { border-left-color: var(--blue); }
  .task.moderable[data-source="mega-review"] { border-left-color: var(--red); }
  .task.moderable[data-source="coderabbit"] { border-left-color: var(--purple); }
  .source-badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; white-space: nowrap; vertical-align: middle; }
  .source-badge.strategist { background: rgba(59,130,246,0.15); color: var(--blue); }
  .source-badge.mega-review { background: rgba(239,68,68,0.12); color: var(--red); }
  .source-badge.coderabbit { background: rgba(167,139,250,0.15); color: var(--purple); }
  .mod-actions { display: inline-flex; gap: 4px; margin-left: 8px; flex-shrink: 0; }
  .mod-btn { font-size: 11px; padding: 1px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: var(--sans); transition: all 0.15s; white-space: nowrap; }
  .mod-btn:hover { background: var(--surface-2); }
  .mod-btn.keep { color: var(--green); border-color: rgba(34,197,94,0.3); }
  .mod-btn.keep:hover { background: rgba(34,197,94,0.12); }
  .mod-btn.remove { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .mod-btn.remove:hover { background: rgba(239,68,68,0.1); }
  .mod-btn:disabled { opacity: 0.4; cursor: default; }
  .task.mod-removing { animation: modFadeOut 0.3s ease forwards; }
  .task.mod-kept .source-badge, .task.mod-kept .mod-actions { display: none; }
  .task.mod-kept { border-left-color: var(--border); }
  @keyframes modFadeOut { to { opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; } }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .header-top { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">Architect</a>
  <a href="mega-review.html">Health</a>
  <a href="hunter-backlog.html">Hunter</a>
  <a href="sami-backlog.html">SAMI</a>
  <a class="active" href="vedic-backlog.html">Vedic</a>
  <a href="portfolio-backlog.html">Portfolio</a>
</div>
<div class="header">
  <div class="header-top">
    <h1>Vedic Turkiye</h1>
    <div class="meta"><span class="live"></span> <span id="lastUpdate">loading...</span></div>
  </div>
  <div class="desc-text">Vedik Astroloji platformu. Next.js 16, VedAstro + Prokerala + VedicAstroAPI, Claude AI, Shopier. Vercel.</div>
  <div class="header-links">
    <a href="https://vedic-turkiye.vercel.app" target="_blank">vedic-turkiye.vercel.app</a>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="content"></div>

<script>
const BACKLOG_URL = 'vedic-BACKLOG.md';
const REFRESH_INTERVAL = 30000;

function parseBacklogMd(md) {
  const lines = md.split('\n');
  const sections = [];
  let current = null;
  let group = null;

  for (const line of lines) {
    if (/^---\s*$/.test(line)) { group = null; continue; }

    const secMatch = line.match(/^## (.+)/);
    if (secMatch) {
      const name = secMatch[1].trim();
      current = { name, groups: [], tasks: [] };
      sections.push(current);
      group = null;
      continue;
    }

    const grpMatch = line.match(/^### (.+)/);
    if (grpMatch && current) {
      group = { title: grpMatch[1].trim(), tasks: [] };
      current.groups.push(group);
      continue;
    }

    const taskMatch = line.match(/^- \[([ x])\]\s+(.+)/);
    if (taskMatch) {
      const done = taskMatch[1] === 'x';
      const raw = taskMatch[2].trim();

      let id = '';
      let text = raw;
      let detail = '';

      // Extract VT-xxx or DS-xxx or SJ-xxx IDs
      const idMatch = raw.match(/^((?:VT|DS|SJ)-\d+(?:[–\-](?:VT|DS|SJ)-?\d+)?):?\s*/);
      if (idMatch) {
        id = idMatch[1];
        text = raw.slice(idMatch[0].length);
      }

      // Extract bold title and description
      const boldSplit = text.match(/^\*\*(.+?)\*\*\s*[—\-]\s*(.*)/s);
      if (boldSplit) {
        text = boldSplit[1];
        detail = boldSplit[2] || '';
      } else {
        const boldOnly = text.match(/^\*\*(.+?)\*\*/);
        if (boldOnly) text = boldOnly[1];
      }

      // Strip trailing checkmark markers
      text = text.replace(/\s*[✅⏳]\s*$/, '').trim();
      detail = detail.replace(/\s*[✅⏳]\s*$/, '').trim();

      const task = { text, done, id };
      if (detail) task.detail = detail;

      if (group) group.tasks.push(task);
      else if (current) {
        if (!current._ungrouped) {
          current._ungrouped = { title: '', tasks: [] };
          current.groups.push(current._ungrouped);
        }
        current._ungrouped.tasks.push(task);
      }
      continue;
    }
  }

  return { sections };
}

function countAll(sections) {
  let total = 0, done = 0, blockers = 0;
  for (const s of sections) {
    for (const g of s.groups) {
      const isBlocker = /blocker/i.test(g.title);
      for (const t of g.tasks) {
        total++;
        if (t.done) done++;
        if (isBlocker && !t.done) blockers++;
      }
    }
  }
  const open = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  return { total, done, open, blockers, pct };
}

function renderStats(sections) {
  const c = countAll(sections);
  const items = [
    { value: c.open, label: 'Open', color: 'var(--text)' },
    { value: c.done, label: 'Done', color: 'var(--done)' },
    { value: c.blockers, label: 'Blockers', color: 'var(--red)' },
    { value: c.total, label: 'Total', color: 'var(--muted)' },
    { value: c.pct + '%', label: 'Progress', color: 'var(--pink)' },
  ];
  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat"><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
}

function classifySection(name) {
  const lower = name.toLowerCase();
  if (/completed|legacy|archive/.test(lower)) return { badge: 'done', collapse: true, doneSection: true };
  if (/current sprint/.test(lower)) return { badge: 'active', collapse: false };
  if (/phase\s*[01]/.test(lower)) return { badge: 'active', collapse: false };
  if (/code quality/.test(lower)) return { badge: 'active', collapse: false };
  if (/phase\s*[234]/.test(lower)) return { badge: 'planned', collapse: true };
  return { badge: 'active', collapse: false };
}

function renderSection(section) {
  const allTasks = section.groups.flatMap(g => g.tasks);
  const doneCount = allTasks.filter(t => t.done).length;
  const total = allTasks.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  const info = classifySection(section.name);
  const badgeClass = pct === 100 ? 'badge-done' : 'badge-' + info.badge;
  const badgeText = pct === 100 ? 'done' : info.badge;
  const collapsed = info.collapse || pct === 100 ? ' collapsed' : '';
  const doneClass = info.doneSection ? ' done-section' : '';

  return `
    <div class="section${doneClass}${collapsed}">
      <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div><span class="section-title">${esc(section.name)}</span> <span class="section-badge ${badgeClass}">${badgeText}</span></div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--muted)">${doneCount}/${total}</span>
          <span class="collapse-icon">&#x25BC;</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="section-body">${section.groups.map(renderGroup).join('')}</div>
    </div>`;
}

function renderGroup(group) {
  if (!group.title && !group.tasks.length) return '';
  const isBlocker = /blocker/i.test(group.title);
  const blockerClass = isBlocker ? ' blockers' : '';
  let dotColor = 'var(--muted)';
  if (isBlocker) dotColor = 'var(--amber)';
  else if (/^P0/i.test(group.title)) dotColor = 'var(--red)';
  else if (/^P1/i.test(group.title)) dotColor = 'var(--amber)';
  else if (/^P2/i.test(group.title)) dotColor = 'var(--green)';
  else if (/^P3/i.test(group.title)) dotColor = 'var(--dim)';
  else if (/completed|done/i.test(group.title)) dotColor = 'var(--done)';
  else if (/vercel|env/i.test(group.title)) dotColor = 'var(--blue)';

  const titleHtml = group.title ? `<div class="group-title"><span class="priority-dot" style="background:${dotColor}"></span>${esc(group.title)}</div>` : '';

  return `
    <div class="group${blockerClass}">
      ${titleHtml}
      ${group.tasks.map(renderTask).join('')}
    </div>`;
}

const SOURCE_TAGS = ['strategist', 'mega-review', 'coderabbit'];
const PROJECT_ID = 'vedic';

function detectSource(text, detail) {
  const full = text + ' ' + (detail || '');
  for (const tag of SOURCE_TAGS) {
    if (full.includes('[' + tag + ']')) return tag;
  }
  return null;
}

function stripSourceTag(text, tag) {
  return text.replace(new RegExp('\\s*\\`?\\[' + tag + '\\]\\`?', 'g'), '').trim();
}

function renderTask(task) {
  const source = task.done ? null : detectSource(task.text, task.detail);
  const doneClass = task.done ? 'task-done' : '';
  const hasDetail = task.detail ? 'has-detail' : '';
  const modCls = source ? ' moderable' : '';
  const dataAttr = source ? ` data-source="${source}"` : '';
  const clickHandler = task.detail ? 'onclick="toggleDetail(this)"' : '';
  const idHtml = task.id ? `<span class="task-id">${esc(task.id)}</span>` : '';
  const cleanText = source ? stripSourceTag(task.text, source) : task.text;
  const cleanDetail = source && task.detail ? stripSourceTag(task.detail, source) : (task.detail || '');
  const badge = source ? `<span class="source-badge ${source}">${source}</span>` : '';
  const rawTask = (task.text + (task.detail ? ' — ' + task.detail : '')).replace(/`/g, '');
  const actions = source ? `<span class="mod-actions"><button class="mod-btn keep" onclick="event.stopPropagation();moderate(this,'keep','${esc(rawTask).replace(/'/g, "\\'")}')">&#10003; Keep</button><button class="mod-btn remove" onclick="event.stopPropagation();moderate(this,'remove','${esc(rawTask).replace(/'/g, "\\'")}')">&#10007; Remove</button></span>` : '';

  return `
    <div class="task ${doneClass} ${hasDetail}${modCls}" ${clickHandler}${dataAttr}>
      <div class="task-check"></div>
      <div class="task-content">
        <div class="task-row">
          ${idHtml}
          <span class="task-text"><strong>${esc(cleanText)}</strong></span>${badge}${actions}
          ${task.detail ? '<span class="expand-icon">&#x25B6;</span>' : ''}
        </div>
        ${cleanDetail ? `<div class="task-detail">${esc(cleanDetail)}</div>` : ''}
      </div>
    </div>`;
}

function esc(str) { const el = document.createElement('span'); el.textContent = str; return el.innerHTML; }
function toggleDetail(el) { el.classList.toggle('expanded'); const d = el.querySelector('.task-detail'); if (d) d.classList.toggle('open'); }

async function moderate(btn, action, taskText) {
  const task = btn.closest('.task');
  const btns = task.querySelectorAll('.mod-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch('/api/moderate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, project: PROJECT_ID, task: taskText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    if (action === 'remove') {
      task.classList.add('mod-removing');
      setTimeout(() => task.remove(), 350);
    } else {
      task.classList.add('mod-kept');
      task.removeAttribute('data-source');
    }
  } catch (e) {
    console.error('Moderate error:', e);
    btns.forEach(b => b.disabled = false);
  }
}

async function loadAndRender() {
  let md;
  try {
    const res = await fetch(BACKLOG_URL + '?' + Date.now());
    if (!res.ok) throw new Error(res.status);
    md = await res.text();
  } catch (err) {
    document.getElementById('content').innerHTML = '<p class="error-msg">Failed to load ' + BACKLOG_URL + '</p>';
    return;
  }

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  const data = parseBacklogMd(md);

  renderStats(data.sections);

  let html = '';
  for (const section of data.sections) {
    html += renderSection(section);
  }
  document.getElementById('content').innerHTML = html;
}

loadAndRender();
setInterval(loadAndRender, REFRESH_INTERVAL);
</script>
</body>
</html>
